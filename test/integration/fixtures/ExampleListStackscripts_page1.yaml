      "jrzavaschi1992", "user_gravatar_id": "6c0262d5482846284b510b579df19fdd", "label":
      "WordPress", "description": "A ready-to-rock WordPress install using the latest
      release from WordPress.org.\r\n\r\nInstalls WordPress on a full LAMP stack using
      MySQL for Debian/Ubuntu and MariaDB for CentOS (the new default).", "ordinal":
      0, "logo_url": "", "images": ["linode/ubuntu14.04lts", "linode/centos7", "linode/debian8"],
      "deployments_total": 0, "deployments_active": 0, "is_public": true, "mine":
      false, "created": "2018-01-02T03:04:05", "updated": "2018-01-02T03:04:05", "rev_note":
      "Fixes firewall rule issues.", "script": "#!/usr/bin/env python\n\n\"\"\"\nWordPress
      StackScript\n\n\tAuthor: Ricardo N Feliciano <rfeliciano@linode.com>\n\tVersion:
      1.0.0.0\n\tRequirements:\n\t\t- ss://linode/python-library <ssinclude StackScriptID=\"3\">\n\t\t-
      ss://linode/apache <ssinclude StackScriptID=\"5\">\n\t\t- ss://linode/mysql
      <ssinclude StackScriptID=\"7\">\n\t\t- ss://linode/php <ssinclude StackScriptID=\"8\">\n\t\t-
      ss://linode/lamp-stack <ssinclude StackScriptID=\"9\">\n\nThis StackScript both
      deploys and provides a library of functions for creating\na basic WordPress
      install. This StackScript is designed to be run across\nLinode''s Core Distributions:\n\t-
      Ubuntu LTS\n\t- CentOS\n\t- Debian\n\nStackScript User-Defined Variables (UDF):\n\t\n\t<UDF
      name=\"db_root_password\" label=\"MariaDB/MySQL root password\" />\n\t<UDF name=\"db_name\"
      label=\"Database name for WordPress\" default=\"wordpress\" />\n\"\"\"\n\nimport
      os\nimport pwd\nimport shutil\nimport sys\nimport tarfile\nimport urllib\nimport
      subprocess\n\ntry: # we''ll need to rename included StackScripts before we can
      import them\n\tos.rename(\"/root/ssinclude-3\", \"/root/pythonlib.py\")\n\tos.rename(\"/root/ssinclude-5\",
      \"/root/apache.py\")\n\tos.rename(\"/root/ssinclude-7\", \"/root/mysql.py\")\n\tos.rename(\"/root/ssinclude-8\",
      \"/root/php.py\")\n\tos.rename(\"/root/ssinclude-9\", \"/root/lamp.py\")\nexcept:\n\tpass\n\nimport
      pythonlib\nimport apache\nimport mysql\nimport php\nimport lamp\n\n\ndef install(path):\n\t\"\"\"Install
      WordPress.\"\"\"\n\t#logging support\n\t\n\tshutil.rmtree(path)\n\turllib.urlretrieve(\"https://wordpress.org/latest.tar.gz\",
      \"wordpress.tar.gz\")\n\ttarball = tarfile.open(\"wordpress.tar.gz\")\n\ttarball.extractall(os.path.dirname(path))\n\ttarball.close()\n\n\tos.rename(os.path.dirname(path)
      + \"/wordpress\", path)\n\t\n\t# might be better off a part of the Apache StackScript
      in the future\n\thttpd_user = {\n\t\t''debian'': ''www-data'',\n\t\t''redhat'':
      ''apache''\n\t}\n\t\n\t# Recursively set permissions for our web directory\n\tos.chown(path,
      pwd.getpwnam(httpd_user[pythonlib.distro[''family'']]).pw_uid, -1)\n\tfor root,
      dirs, files in os.walk(path):  \n\t\tfor found_dirs in dirs:  \n\t\t\tos.chown(os.path.join(root,
      found_dirs), pwd.getpwnam(httpd_user[pythonlib.distro[''family'']]).pw_uid,
      -1)\n\t\tfor found_files in files:\n\t\t\tos.chown(os.path.join(root, found_files),
      pwd.getpwnam(httpd_user[pythonlib.distro[''family'']]).pw_uid, -1)\n\n\ndef
      main():\n\t\"\"\"Install WordPress on a basic LAMP stack.\n\t\n\tMost of the
      initial code in this function needs to be pulled from the LAMP\n\tStackScript
