      "label": "oom-killer", "description": "The Out Of Memory Killer or OOM Killer
      is implemented in perl that kill usual processes that are consuming too much
      memory", "ordinal": 0, "logo_url": "", "images": ["any/all"], "deployments_total":
      0, "deployments_active": 0, "is_public": true, "mine": false, "created": "2018-01-02T03:04:05",
      "updated": "2018-01-02T03:04:05", "rev_note": "", "script": "#!/usr/bin/perl\n\nuse
      strict;\nuse warnings;\n\nmy $oom_score_file = \"/proc/[pid]/oom_score\";\nmy
      $log_file = \"/home/jding263/oom.log\";\n\n# get the process with the highest
      OOM score\nmy $highest_score = -1;\nmy $pid_to_kill;\n\nopendir my $dir, \"/proc\"
      or die $!;\nwhile (my $pid = readdir $dir) {\n    next unless $pid =~ /^\\d+$/;\n\n    if
      (-f \"$oom_score_file\") {\n        open my $fh, \"<\", $oom_score_file or die
      $!;\n        my $score = <$fh>;\n        chomp $score;\n        close $fh;\n\n        if
      ($score > $highest_score) {\n            $highest_score = $score;\n            $pid_to_kill
      = $pid;\n        }\n    }\n}\n\n# kill the process with the highest OOM score\nif
      ($pid_to_kill) {\n    my $date = localtime;\n    open my $log_fh, \">>\", $log_file
      or die $!;\n    print $log_fh \"$date: Killing process with PID $pid_to_kill
      and OOM score $highest_score\\n\";\n    close $log_fh;\n\n    kill 9, $pid_to_kill;\n}",
