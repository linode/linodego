      <ssinclude StackScriptID=666912>\n\n# Logging\nexec > >(tee /dev/ttyS0 /var/log/stackscript.log)
      2>&1\nset -o pipefail\n\n# Set hostname, configure apt and perform update/upgrade\napt_setup_update\n\n#
