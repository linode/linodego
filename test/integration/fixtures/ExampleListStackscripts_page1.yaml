      true, "mine": false, "created": "2018-01-02T03:04:05", "updated": "2018-01-02T03:04:05",
      "rev_note": "Re-write for readability", "script": "#!/usr/bin/env bash\n\n#
      StackScript Bash Library\n#\n# Copyright (c) 2010 Linode LLC / Christopher S.
      Aker <caker@linode.com>\n# All rights reserved.\n#\n#\n# Redistribution and
      use in source and binary forms, with or without modification,\n# are permitted
      provided that the following conditions are met:\n#\n# * Redistributions of source
      code must retain the above copyright notice, this\n# list of conditions and
      the following disclaimer.\n#\n# * Redistributions in binary form must reproduce
      the above copyright notice, this\n# list of conditions and the following disclaimer
      in the documentation and/or\n# other materials provided with the distribution.\n#\n#
      * Neither the name of Linode LLC nor the names of its contributors may be\n#
      used to endorse or promote products derived from this software without specific
      prior\n# written permission.\n#\n# THIS SOFTWARE IS PROVIDED BY THE COPYRIGHT
      HOLDERS AND CONTRIBUTORS \"AS IS\" AND ANY\n# EXPRESS OR IMPLIED WARRANTIES,
      INCLUDING, BUT NOT LIMITED TO, THE IMPLIED WARRANTIES\n# OF MERCHANTABILITY
      AND FITNESS FOR A PARTICULAR PURPOSE ARE DISCLAIMED. IN NO EVENT\n# SHALL THE
      COPYRIGHT HOLDER OR CONTRIBUTORS BE LIABLE FOR ANY DIRECT, INDIRECT,\n# INCIDENTAL,
      SPECIAL, EXEMPLARY, OR CONSEQUENTIAL DAMAGES (INCLUDING, BUT NOT LIMITED\n#
      TO, PROCUREMENT OF SUBSTITUTE GOODS OR SERVICES; LOSS OF USE, DATA, OR PROFITS;
      OR\n# BUSINESS INTERRUPTION) HOWEVER CAUSED AND ON ANY THEORY OF LIABILITY,
      WHETHER IN\n# CONTRACT, STRICT LIABILITY, OR TORT (INCLUDING NEGLIGENCE OR OTHERWISE)
      ARISING IN\n# ANY WAY OUT OF THE USE OF THIS SOFTWARE, EVEN IF ADVISED OF THE
      POSSIBILITY OF SUCH\n# DAMAGE.\n#\n\n\n###########################################################\n#
      System\n###########################################################\n\nfunction
      debian_upgrade {\n    printf \"Running initial updates - This will take a while...\\n\"\n    DEBIAN_FRONTEND=noninteractive
      apt-get -y upgrade >/dev/null\n}\n\nfunction system_update {\n    case \"${detected_distro[family]}\"
      in\n        ''debian'')\n            # Force IPv4 and noninteractive upgrade
      after script runs to prevent\n            # breaking nf_conntrack\n            echo
      ''Acquir1234::5678orceIPv4 \"true\";'' > /etc/apt/apt.conf.d/99force-ipv4\n\n            #
      Run initial updates for Debian-based systems, and do it quietly\n            printf
      \"Checking for initial updates...\\n\"\n            DEBIAN_FRONTEND=noninteractive
      apt-get update -qq >/dev/null\n            ;;\n        ''redhat'')\n            #
      Run initial updates for RedHat-based systems, quietly\n            # Also, add
      the ''epel-release'' repository to yum\n            printf \"Running initial
      updates - This will take a while...\\n\"\n            yum --quiet -y update
      >/dev/null\n            yum --quiet -y install epel-release >/dev/null\n            yum
      --quiet repolist\n            ;;\n    esac\n}\n\nfunction system_primary_ip
      {\n    local ip_address=\"$(ip a | awk ''/inet / {print $2}'')\"\n    echo $ip_address
      | cut -d'' '' -f 2 | cut -d/ -f 1\n}\n\nfunction system_primary_ipv6 {\n    ip
      -6 a | grep inet6 | awk ''/global/{print $2}'' | cut -d/ -f1\n}\n\nfunction
      system_private_ip {\n    local ip_address=\"$(ip a | awk ''/inet 192.168/ {print
      $2}'')\"\n    echo $ip_address | cut -d '' '' -f 2 | cut -d/ -f 1\n}\n\nfunction
      get_rdns {\n    # $1 - The IP address to query\n    [ ! -e /usr/bin/host ] &&
      system_install_package dnsutils\n\n    host \"$1\" | awk ''/pointer/ {print
      $5}'' | sed ''s/\\.$//''\n}\n\nfunction get_rdns_primary_ip {\n    # returns
      the reverse dns of the primary IP assigned to this system\n    get_rdns $(system_primary_ip)\n}\n\nfunction
      system_set_hostname {\n    # Sets the system''s hostname\n    # $1 - The hostname
      to define\n    local -r hostname=\"$1\"\n\n    [ ! -n \"$hostname\" ] && {\n        printf
      \"Hostname undefined\\n\"\n        return 1;\n    }\n\n    hostnamectl set-hostname
      \"$hostname\"\n}\n\nfunction system_add_host_entry {\n    # $1 - The IP address
      to set a hosts entry for\n    # $2 - The fqdn to set to the IP\n    # $3 - The
      Hostname to set a hosts entry for\n    local -r ip_address=\"$1\" fqdn=\"$2\"
      hostname=\"$3\"\n\n    [ -z \"$ip_address\" -o -z \"$fqdn\" ] && {\n        printf
      \"IP address and/or fqdn undefined in system_add_host_entry()\\n\"\n        return
      1;\n    }\n\n    echo \"$ip_address $fqdn $hostname\" >> /etc/hosts\n}\n\nfunction
      detect_distro {\n    # Determine which distribution is in use on the Linode\n\n    #
      $1 - required - Which value to echo back to the calling function\n    [ ! -n
      \"$1\" ] && {\n        printf \"detect_distro() requires which value to be returned
      as its only argument\\n\"\n        return 1;\n    }\n\n    local distro=\"$(grep
      \"^ID=\" /etc/os-release | cut -d= -f2)\"\n    distro=\"$(sed -e ''s/^\"//''
      -e ''s/\"$//'' <<<\"$distro\")\"\n    local version=\"$(grep \"^VERSION_ID=\"
      /etc/os-release | cut -d= -f2)\"\n    version=\"$(sed -e ''s/^\"//'' -e ''s/\"$//''
      <<<\"$version\")\"\n\n    [ -f /etc/debian_version ] && local -r family=''debian''\n    [
      -f /etc/redhat-release ] && local -r family=''redhat''\n\n    # Determine what
      the calling function wants and provide it\n    case \"$1\" in\n        ''distro'')\n            printf
      \"%s\\n\" \"$distro\"\n            ;;\n        ''family'')\n            printf
      \"%s\\n\" \"$family\"\n            ;;\n        ''version'')\n            printf
      \"%s\\n\" \"$version\"\n            ;;\n        *)\n            printf \"This
      does not appear to be a supported distribution\\n\"\n            return 1;\n            ;;\n    esac\n}\n\nfunction
      system_set_timezone {\n    # Sets the timezone on the Linode\n\n    # $1 - required
      - timezone to set on the system\n    [ ! -n \"$1\" ] && {\n         printf \"system_set_timezone()
      requires the Linode''s timezone as its only argument\\n\"\n         return 1;\n    }\n\n    timedatectl
      set-timezone \"$1\"\n}\n\nfunction system_install_package {\n    # This function
      expands a bit on the old system_install_package() by allowing installation of
      a\n    # list of packages, stored in an array, using a single command instead
      of requiring scripts\n    # to call the function once for each package to be
      installed\n    [ ! -n \"$1\" ] && {\n        printf \"system_install_package()
      requires the package(s) to be installed as its only argument\\n\"\n        return
      1;\n    }\n    local packages=(\"${@}\")\n\n    # Determine which package manager
      to use, and install the specified package\n    case \"${detected_distro[''family'']}\"
      in\n        ''debian'')\n            DEBIAN_FRONTEND=noninteractive apt-get
      -y install \"${packages[@]}\" -qq >/dev/null || {\n                printf \"One
      of the packages could not be installed via apt-get\\n\"\n                printf
      \"Check out /var/log/stackscript.log for more details\\n\"\n                return
      1;\n            }\n            ;;\n        ''redhat'')\n            yum --quiet
      -y install \"${packages[@]}\" >/dev/null || {\n                printf \"One
      of the packages could not be installed via yum\\n\"\n                printf
      \"Check out /var/log/stackscript.log for more details\\n\"\n                return
      1;\n            }\n            ;;\n    esac\n}\n\nfunction system_remove_package
      {\n    # This function expands a bit on the system_remove_package() by allowing
      removal of a\n    # list of packages, stored in an array, using a single command
      instead of requiring scripts\n    # to call the function once for each package
      removed\n    [ ! -n \"$1\" ] && {\n        printf \"system_remove_package()
      requires the package to be removed as its only argument\\n\"\n        return
      1;\n    }\n    local packages=(\"${@}\")\n\n    # Determine which package manager
      to use, and remove the specified package\n    case \"${detected_distro[''family'']}\"
      in\n        ''debian'')\n            DEBIAN_FRONTEND=noninteractive apt-get
      -y purge \"${packages[@]}\" -qq >/dev/null || {\n                printf \"One
      of the packages could not be removed via apt-get\\n\"\n                printf
      \"Check out /var/log/stackscript.log for more details\\n\"\n                return
      1;\n            }\n            ;;\n        ''redhat'')\n            yum --quiet
      -y remove \"${packages[@]}\" >/dev/null || {\n                printf \"One of
      the packages could not be removed via yum\\n\"\n                printf \"Check
      out /var/log/stackscript.log for more details\\n\"\n                return 1;\n            }\n            ;;\n    esac\n}\n\nfunction
      system_configure_ntp {\n    case \"${detected_distro[distro]}\" in\n        ''debian'')\n            if
      [ \"$(echo \"${detected_distro[version_major]}\")\" -ge 10 ]; then\n                systemctl
      start systemd-timesyncd\n            fi\n            ;;\n        ''ubuntu'')\n            if
      [ \"$(echo \"${detected_distro[version_major]}\")\" -ge 20 ]; then\n                systemctl
      start systemd-timesyncd\n            fi\n            ;;\n        *)\n            system_install_package
      ntp\n            systemctl enable ntpd\n            systemctl start ntpd\n            ;;\n    esac\n}\n\n\n###########################################################\n#
      Users and Security\n###########################################################\n\nfunction
      user_add_sudo {\n    # $1 - required - username\n    # $2 - required - password\n    [
      ! -n \"$1\" -o ! -n \"$2\" ] && {\n        printf \"No new username and/or password
      entered\\n\"\n        return 1;\n    }\n    local -r username=\"$1\" userpass=\"$2\"\n\n    [
      ! -x /usr/bin/sudo ] && system_install_package sudo\n    case \"${detected_distro[family]}\"
      in\n        ''debian'')\n            # Add the user and set the password\n            adduser
      \"$username\" --disabled-password --gecos \"\"\n            echo \"${username}:${userpass}\"
      | chpasswd\n\n            # Add the newly created user to the ''sudo'' group\n            adduser
      \"$username\" sudo >/dev/null\n            ;;\n        ''redhat'')\n            #
      Add the user and set the password\n            useradd \"$username\"\n            echo
      \"${username}:${userpass}\" | chpasswd\n\n            # Add the newly created
      user to the ''wheel'' group\n            usermod -aG wheel \"$username\" >/dev/null\n            ;;\n    esac\n}\n\nfunction
      user_add_pubkey {\n    # Adds the users public key to authorized_keys for the
      specified user. Make sure you wrap\n    # your input variables in \"{double
      quotes and curly braces}\", or the key may not load properly\n    # $1 - Required
      - username\n    # $2 - Required - public key\n    [ ! -n \"$1\" -o ! -n \"$2\"
      ] && {\n        printf \"Must provide a username and a public key\\n\"\n        return
      1;\n    }\n    local -r username=\"$1\" userpubkey=\"$2\"\n\n    case \"$username\"
      in\n        ''root'')\n            mkdir /root/.ssh\n            echo \"$userpubkey\"
      >> /root/.ssh/authorized_keys\n            return 1;\n            ;;\n        *)\n            mkdir
      -p /home/\"${username}\"/.ssh\n            chmod -R 700 /home/\"${username}\"/.ssh/\n            echo
      \"$userpubkey\" >> /home/\"${username}\"/.ssh/authorized_keys\n            chown
      -R \"${username}\":\"${username}\" /home/\"${username}\"/.ssh\n            chmod
      600 /home/\"${username}\"/.ssh/authorized_keys\n            ;;\n    esac\n}\n\nfunction
      ssh_disable_root {\n    # Disable root SSH access\n    sed -i ''s/PermitRootLogin
      yes/PermitRootLogin no/'' /etc/ssh/sshd_config\n    sed -i -e \"s/#PermitRootLogin
      no/PermitRootLogin no/\" /etc/ssh/sshd_config\n\n    # Disable password authentication\n    sed
      -i -e \"s/PasswordAuthentication yes/PasswordAuthentication no/\" /etc/ssh/sshd_config\n    sed
      -i -e \"s/#PasswordAuthentication no/PasswordAuthentication no/\" /etc/ssh/sshd_config\n\n    #
      Restart SSHd\n    [ \"${detected_distro[family]}\" == ''debian'' ] && systemctl
      restart ssh\n    [ \"${detected_distro[family]}\" == ''redhat'' ] && systemctl
      restart sshd\n}\n\nfunction configure_ufw_firewall {\n    local -a ports=(\"$@\")\n\n    #
      Open the ports specified in \"${@}\"\n    for i in \"${ports[@]}\"; do\n        ufw
      allow \"$i\"\n    done\n    ufw reload\n}\n\nfunction configure_basic_firewall
      {\n    case \"${detected_distro[family]}\" in\n        ''debian'')\n            iptables
      --policy INPUT DROP\n            iptables --policy OUTPUT ACCEPT\n            iptables
      --policy FORWARD DROP\n            iptables -A INPUT -m state --state ESTABLISHED,RELATED
      -j ACCEPT\n            iptables -A INPUT -i lo -m comment --comment \"Allow
      loopback connections\" -j ACCEPT\n            iptables -A INPUT -p icmp -m comment
      --comment \"Allow Ping to work as expected\" -j ACCEPT\n            ip6tables
      --policy INPUT DROP\n            ip6tables --policy OUTPUT ACCEPT\n            ip6tables
      --policy FORWARD DROP\n            ip6tables -A INPUT -m state --state ESTABLISHED,RELATED
      -j ACCEPT\n            ip6tables -A INPUT -i lo -m comment --comment \"Allow
      loopback connections\" -j ACCEPT\n            ip6tables -A INPUT -p icmpv6 -m
      comment --comment \"Allow Ping to work as expected\" -j ACCEPT\n            ;;\n    esac\n\n    #
      Open port 22 for SSH\n    add_port ''ipv4'' 22 ''tcp''\n    add_port ''ipv6''
      22 ''tcp''\n    save_firewall\n}\n\nfunction add_port {\n    # $1 - required
      - IP standard to use (IPv4 or IPv6)\n    # $2  - Required - Port to open\n    [
      ! -n \"$1\" ] && {\n        printf \"add_port() requires the IP standard (IPv4/IPv6)
      as its first argument\\n\"\n        return 1;\n    }\n    [ ! -n \"$2\" ] &&
      {\n        printf \"add_port() requires the port number as its second argument\\n\"\n        return
      1;\n    }\n    [ ! -n \"$3\" ] && {\n        printf \"add_port() requires the
      protocol (TCP/UDP) as its third argument\\n\"\n        return 1;\n    }\n    local
      -r standard=\"${1,,}\" port=\"$2\" protocol=\"${3,,}\"\n\n    case \"${detected_distro[family]}\"
      in\n        ''redhat'')\n            firewall-cmd --quiet --permanent --add-port=\"${port}/${protocol}\"\n            firewall-cmd
      --quiet --reload\n            ;;\n        *)\n            if [ -x /usr/sbin/ufw
      ]; then\n                ufw allow \"$port/$protocol\"\n            else\n                case
      \"$standard\" in\n                    ''ipv4'')\n                        iptables
      -A INPUT -p \"$protocol\" --dport \"$port\" -m state --state NEW,ESTABLISHED,RELATED
      -j ACCEPT\n                        ;;\n                    ''ipv6'')\n                        ip6tables
      -A INPUT -p \"$protocol\" --dport \"$port\" -m state --state NEW,ESTABLISHED,RELATED
      -j ACCEPT\n                        ;;\n                esac\n            fi\n            ;;\n    esac\n}\n\nfunction
      add_ports {\n    # Opens a list of firewall ports for both IPv4 and IPv6\n    local
      -a ports=(\"${@}\")\n\n    # Open the ports specified in \"${@}\"\n    for i
      in \"${ports[@]}\"; do\n        add_port ''ipv4'' $i ''tcp''\n        add_port
      ''ipv6'' $i ''tcp''\n    done\n}\n\nfunction save_firewall {\n    case \"${detected_distro[family]}\"
      in\n        ''debian'')\n            # Save the IPv4 and IPv6 rulesets so that
      they will stick through a reboot\n            printf \"Saving firewall rules
      for IPv4 and IPv6...\\n\"\n            echo iptables-persistent iptables-persistent/autosave_v4
      boolean true | sudo debconf-set-selections\n            echo iptables-persistent
      iptables-persistent/autosave_v6 boolean true | sudo debconf-set-selections\n            system_install_package
      iptables-persistent\n            ;;\n        ''redhat'')\n            firewall-cmd
      --quiet --reload\n            ;;\n    esac\n}\n\nfunction enable_fail2ban {\n    #
      Install fail2ban using the appropriate package manager for your Linode''s distribution\n    system_install_package
      fail2ban\n\n    # Configure fail2ban defaults\n    cd /etc/fail2ban\n    cp
      fail2ban.conf fail2ban.local\n    cp jail.conf jail.local\n    sed -i -e \"s/backend
      = auto/backend = systemd/\" /etc/fail2ban/jail.local\n    systemctl enable fail2ban\n    systemctl
      start fail2ban\n    cd /root/\n\n    # Start fail2ban and enable it as a system
      service\n    systemctl start fail2ban\n    systemctl enable fail2ban\n}\n\nfunction
      enable_passwordless_sudo {\n    # $1 - required - Username to grant passwordless
      sudo access to\n    [ ! -n \"$1\" ] && {\n        printf \"enable_passwordless_sudo()
      requires the username to grant passwordless sudo access to as its only argument\\n\"\n        return
      1;\n    }\n    local -r username=\"$1\"\n\n    echo \"$username ALL = (ALL)
      NOPASSWD: ALL\" >> /etc/sudoers\n}\n\nfunction automatic_security_updates {\n    #
      Configure autmoatic security updates for Debian-based systems\n    if [ \"${detected_distro[family]}\"
      == ''debian'' ]; then\n        system_install_package unattended-upgrades\n        cat
      > /etc/apt/apt.conf.d/20auto-upgrades <<EOF\nAPT1234::5678Periodi1234::5678Update-Package-Lists
      \"1\";\nAPT1234::5678Periodi1234::5678ownload-Upgradeable-Packages \"1\";\nAPT1234::5678Periodi1234::5678utocleanInterval
      \"7\";\nAPT1234::5678Periodi1234::5678Unattended-Upgrade \"1\";\nEOF\n\n    # Configure automatic
      security updates for RedHat-based systems\n    elif [ \"${detected_distro[family]}\"
      == ''redhat'' ]; then\n        system_install_package yum-cron\n        sed
      -i ''s/apply_updates = no/apply_updates = yes/g'' /etc/yum/yum-cron.conf\n    fi\n}\n\n\n###########################################################\n#
      Apache\n###########################################################\nfunction
      apache_install {\n    # Detects the installed distribution, and then installs
      the appropriate Apache version\n\n    case \"${detected_distro[family]}\" in\n        ''debian'')\n            system_install_package
      apache2\n\n            a2dissite 000-default.conf # disable the interfering
      default virtualhost\n\n            # clean up, or add the NameVirtualHost line
      to ports.conf\n            sed -i -e ''s/^NameVirtualHost \\*$/NameVirtualHost
      *:80/'' /etc/apache2/ports.conf\n            if ! grep -q NameVirtualHost /etc/apache2/ports.conf;
      then\n                echo ''NameVirtualHost *:80'' > /etc/apache2/ports.conf.tmp\n                cat
      /etc/apache2/ports.conf >> /etc/apache2/ports.conf.tmp\n                mv -f
      /etc/apache2/ports.conf.tmp /etc/apache2/ports.conf\n            fi\n            ;;\n        ''redhat'')\n            system_install_package
      httpd\n\n            # Turn off KeepAlive and adjust the resource use settings.
      These settings\n            # are a good starting point for a Linode 2GB\n            echo
      \"KeepAlive Off\" >> /etc/httpd/conf/httpd.conf\n            echo \"\" >> /etc/httpd/conf/httpd.conf\n            echo
      \"\" >> /etc/httpd/conf/httpd.conf\n            echo \"<IfModule prefork.c>\"
      >> /etc/httpd/conf/httpd.conf\n            echo \"    StartServers        4\"
      >> /etc/httpd/conf/httpd.conf\n            echo \"    MinSpareServers     20\"
      >> /etc/httpd/conf/httpd.conf\n            echo \"    MaxSpareServers     40\"
      >> /etc/httpd/conf/httpd.conf\n            echo \"    MaxClients          200\"
      >> /etc/httpd/conf/httpd.conf\n            echo \"    MaxRequestsPerChild 4500\"
      >> /etc/httpd/conf/httpd.conf\n            echo \"</IfModule>\" >> /etc/httpd/conf/httpd.conf\n\n            #
      Enable and restart Apache\n            systemctl enable httpd.service\n            systemctl
      restart httpd.service\n            ;;\n    esac\n\n    # Open TCP port 80 to
      allow Apache through the firewall\n    add_port ''ipv4'' 80 ''tcp''\n}\n\nfunction
      apache_tune {\n    # Tunes Apache''s memory to use the percentage of RAM you
      specify, defaulting to 40%\n\n    # $1 - the percent of system memory to allocate
      towards Apache\n    if [ ! -n \"$1\" ];\n        then local -r percent=40\n        else
      local -r percent=\"$1\"\n    fi\n\n    system_install_package apache2-mpm-prefork\n\n    local
      -r perprocmem=10 # the amount of memory in MB each apache process is likely
      to utilize\n    local -r mem=\"$(grep MemTotal /proc/meminfo | awk ''{ print
      int($2/1024) }'')\" # how much memory in MB this system has\n    local maxclients=\"$((mem*percent/100/perprocmem))\"
      # calculate MaxClients\n\n    maxclients=\"${maxclients/.*}\" # cast to an integer\n    sed
      -i -e \"s/\\(^[ \\t]*MaxClients[ \\t]*\\)[0-9]*/\\1$maxclients/\" /etc/apache2/apache2.conf\n    systemctl
      restart apache2\n}\n\nfunction apache_virtualhost {\n    # $1 - required - the
      hostname of the virtualhost to create\n    [ ! -n \"$1\" ] && {\n        printf
      \"apache_virtualhost() requires the hostname as the first argument\\n\"\n        return
      1;\n    }\n    local -r vhostname=\"$1\"\n    [ \"${detected_distro[family]}\"
      == ''debian'' ] && \\\n        local -r vhostfile=\"/etc/apache2/sites-available/$vhostname.conf\"
      \\\n    [ \"${detected_distro[family]}\" == ''redhat'' ] && \\\n        local
      -r vhostfile=\"/etc/httpd/conf.d/vhost.conf\"\n\n    [ -e \"$vhostfile\" ] &&
      {\n        printf \"$vhostfile already exists\\n\"\n        return 1;\n    }\n\n    mkdir
      -p \"/var/www/html/$vhostname/{public_html,logs}\"\n\n    # Configure the VirtualHost\n    echo
      \"<VirtualHost *:80>\" > \"$vhostfile\"\n    echo \"    ServerName $vhostname\"
      >> \"$vhostfile\"\n    echo \"    DocumentRoot /var/www/html/$vhostname/public_html/\"
      >> \"$vhostfile\"\n    echo \"    ErrorLog /var/www/html/$vhostname/logs/error.log\"
      >> \"$vhostfile\"\n    echo \"    CustomLog /var/www/html/$vhostname/logs/access.log
      combined\" >> \"$vhostfile\"\n    echo \"</VirtualHost>\" >> \"$vhostfile\"\n\n    case
      \"${detected_distro[family]}\" in\n        ''debian'')\n            a2ensite
      \"$vhostname\"\n            systemctl restart apache2\n            ;;\n        ''redhat'')\n            #
      Allow Apache in SELinux\n            chown apache:apache -R \"/var/www/html/$vhostname\"/\n            find
      \"/var/www/html/$vhostname\"/ -type f -exec chmod 0644 {} \\;\n            find
      \"/var/www/html/$vhostname\"/ -type d -exec chmod 0755 {} \\;\n            chcon
      -t httpd_sys_content_t \"/var/www/html/$vhostname\" -R\n            chcon -t
      httpd_sys_rw_content_t \"/var/www/html/$vhostname\" -R\n            ;;\n    esac\n}\n\nfunction
      apache_virtualhost_from_rdns {\n    apache_virtualhost \"$(get_rdns_primary_ip)\"\n}\n\nfunction
      apache_virtualhost_get_docroot {\n    # $1 - required - Hostname of the virtualhost
      being configured\n    [ ! -n \"$1\" ] && {\n        printf \"apache_virtualhost_get_docroot()
      requires the hostname as the first argument\\n\"\n        return 1;\n    }\n    local
      -r vhost=\"$1\"\n\n    # Determine distribution, and get the DocumentRoot out
      of the VirtualHost file\n    case \"${detected_distro[family]}\" in\n        ''debian'')\n            [
      -e /etc/apache2/sites-available/\"$vhost.conf\" ] && \\\n                echo
      \"$(awk ''/DocumentRoot/ {print $2}'' /etc/apache2/sites-available/\"$vhost\".conf
      )\"\n            ;;\n        ''redhat'')\n            [ -e /etc/httpd/conf.d/vhost.conf
      ] && \\\n                echo \"$(awk ''/DocumentRoot/ {print $2}'' /etc/httpd/conf.d/vhost.conf)\"\n            ;;\n    esac\n}\n\n\n###########################################################\n#
      mysql-server\n###########################################################\nfunction
      mysql_install {\n    # $1 - the mysql root password\n    [ ! -n \"$1\" ] &&
      {\n        printf \"mysql_install() requires the root pass as its only argument\\n\"\n        return
      1;\n    }\n    local -r db_root_password=\"$1\"\n\n    case \"${detected_distro[family]}\"
      in\n        ''debian'')\n            echo \"mysql-server mysql-server/root_password
      password ${db_root_password}\" | debconf-set-selections\n            echo \"mysql-server
      mysql-server/root_password_again password ${db_root_password}\" | debconf-set-selections\n\n            case
      \"${detected_distro[distro]}\" in\n                ''debian'')\n                    if
      [ \"${detected_distro[version]}\" -ge 10 ];\n                        then system_install_package
      mariadb-server\n                        else system_install_package mysql-server
      mysql-client\n                    fi\n                    ;;\n                ''ubuntu'')\n                    system_install_package
      mysql-server mysql-client\n                    ;;\n            esac\n            ;;\n        ''redhat'')\n            system_install_package
      mariadb-server\n\n            systemctl enable mariadb.service\n            systemctl
      start mariadb.service\n            ;;\n    esac\n\n    mysql_secure_install
      \"$db_root_password\"\n\n    printf \"Sleeping while MySQL starts up for the
      first time...\\n\"\n    sleep 5\n}\n\nfunction mysql_configure {\n    local
      -r db_name=\"$1\" db_root_password=\"$2\" db_username=\"$3\" db_user_password=\"$4\"\n\n    mysql_create_database
      \"$db_root_password\" \"$db_name\"\n    mysql_create_user \"$db_root_password\"
      \"$db_username\" \"$db_user_password\"\n    mysql_grant_user \"$db_root_password\"
      \"$db_username\" \"$db_name\"\n}\n\nfunction mysql_tune {\n    # Tunes MySQL''s
      memory usage to utilize the percentage of memory you specify, defaulting to
      40%\n\n    # $1 - the percent of system memory to allocate towards MySQL\n    if
      [ ! -n \"$1\" ];\n        then local -r percent=40\n        else local -r percent=\"$1\"\n    fi\n\n    case
      \"${detected_distro[family]}\" in\n        ''debian'')\n            [ ! -f /etc/mysql/my.cnf
      ] && touch /etc/mysql/my.cnf\n            sed -i -e ''s/^#skip-innodb/skip-innodb/''
      /etc/mysql/my.cnf # disable innodb - saves about 100M\n            ;;\n        ''redhat'')\n            [
      ! -f /etc/my.cnf ] && touch /etc/my.cnf\n            sed -i -e ''s/^#skip-innodb/skip-innodb/''
      /etc/my.cnf # disable innodb\n            ;;\n    esac\n\n    local -r mem=\"$(awk
      ''/MemTotal/ {print int($2/1024)}'' /proc/meminfo)\" # how much memory in MB
      this system has\n    local -r mymem=\"$((mem*percent/100))\" # how much memory
      we''d like to tune mysql with\n    local -r mymemchunks=\"$((mymem/4))\" # how
      many 4MB chunks we have to play with\n\n    # mysql config options we want to
      set to the percentages in the second list, respectively\n    local optlist=(key_buffer
      sort_buffer_size read_buffer_size read_rnd_buffer_size myisam_sort_buffer_size
      query_cache_size)\n    local distlist=(75 1 1 1 5 15)\n\n    for opt in \"${optlist[@]}\";
      do\n        case \"${detected_distro[family]}\" in\n            ''debian'')\n                sed
      -i -e \"/\\[mysqld\\]/,/\\[.*\\]/s/^${opt}/#${opt}/\" /etc/mysql/my.cnf\n                ;;\n            ''redhat'')\n                sed
      -i -e \"/\\[mysqld\\]/,/\\[.*\\]/s/^${opt}/#${opt}/\" /etc/my.cnf\n                ;;\n        esac\n    done\n\n    for
      i in \"${!optlist[*]}\"; do\n        val=\"$(echo | awk \"{print int((${distlist[$i]}
      * ${mymemchunks}/100))*4}\")\"\n        [ $val -lt 4 ] && val=4\n        config=\"${config}\\n${optlist[$i]}
      = ${val}M\"\n    done\n\n    case \"${detected_distro[family]}\" in\n        ''debian'')\n            sed
      -i -e \"s/\\(\\[mysqld\\]\\)/\\1\\n${config}\\n/\" /etc/mysql/my.cnf\n            systemctl
      restart mysql\n            ;;\n        ''redhat'')\n            sed -i -e \"s/\\(\\[mysqld\\]\\)/\\1\\n${config}\\n/\"
      /etc/my.cnf\n            systemctl restart mariadb\n            ;;\n    esac\n}\n\nfunction
      mysql_create_database {\n    # $1 - the mysql root password\n    # $2 - Required
      - the db name to create\n    [ ! -n \"$1\" ] && {\n        printf \"mysql_create_database()
      requires the root pass as its first argument\\n\"\n        return 1;\n    }\n    [
      ! -n \"$2\" ] && {\n        printf \"mysql_create_database() requires the name
      of the database as the second argument\\n\"\n        return 1;\n    }\n    local
      -r db_root_password=\"$1\" db_name=\"$2\"\n\n    echo \"CREATE DATABASE $db_name;\"
      | mysql -u root -p\"$db_root_password\"\n}\n\nfunction mysql_create_user {\n    #
      $1 - required - the MySQL database''s root password\n    # $2 - required - the
      MySQL user to create\n    # $3 - required - the MySQL user''s password\n    [
      ! -n \"$1\" ] && {\n        printf \"mysql_create_user() requires the root password
      as its first argument\\n\"\n        return 1;\n    }\n    [ ! -n \"$2\" ] &&
      {\n        printf \"mysql_create_user() requires username as the second argument\\n\"\n        return
      1;\n    }\n    [ ! -n \"$3\" ] && {\n        printf \"mysql_create_user() requires
      a password as the third argument\\n\"\n        return 1;\n    }\n\n    local
      -r db_root_password=\"$1\" db_username=\"$2\" db_user_password=\"$3\"\n\n    echo
      \"CREATE USER ''$db_username''@''localhost'' IDENTIFIED BY ''$db_user_password'';\"
      | mysql -u root -p\"$db_root_password\"\n}\n\nfunction mysql_grant_user {\n    #
      $1 - required - The MySQL database''s root password\n    # $2 - required - The
      MySQL user on whom to bestow privileges\n    # $3 - required - The MySQL database''s
      name\n    [ ! -n \"$1\" ] && {\n        printf \"mysql_create_user() requires
      the root password as its first argument\\n\"\n        return 1;\n    }\n    [
      ! -n \"$2\" ] && {\n        printf \"mysql_create_user() requires username as
      the second argument\\n\"\n        return 1;\n    }\n    [ ! -n \"$3\" ] && {\n        printf
      \"mysql_create_user() requires a database as the third argument\\n\"\n        return
      1;\n    }\n    local -r db_root_password=\"$1\" db_username=\"$2\" db_user_password=\"$3\"\n\n    echo
      \"GRANT ALL PRIVILEGES ON $db_user_password.* TO ''$db_username''@''localhost'';\"
      | mysql -u root -p\"$db_root_password\"\n    echo \"FLUSH PRIVILEGES;\" | mysql
      -u root -p\"$db_root_password\"\n}\n\nfunction mysql_secure_install {\n    #
      $1 - required - Root password for the MySQL database\n    [ ! -n \"$1\" ] &&
      {\n        printf \"mysql_secure_install() requires the MySQL database root
      password as its only argument\\n\"\n        return 1;\n    }\n    local -r db_root_password=\"$1\"\n\n    system_install_package
      expect\n    local -r secure_mysql=$(\nexpect -c \"\nset timeout 10\nspawn mysql_secure_installation\nexpect
      \\\"Enter current password for root (enter for ):\\\"\nsend \\\"$db_root_password\\r\\\"\nexpect
      \\\"Change the root password?\\\"\nsend \\\"n\\r\\\"\nexpect \\\"Remove anonymous
      users?\\\"\nsend \\\"y\\r\\\"\nexpect \\\"Disallow root login remotely?\\\"\nsend
      \\\"y\\r\\\"\nexpect \\\"Remove test database and access to it?\\\"\nsend \\\"y\\r\\\"\nexpect
      \\\"Reload privilege tables now?\\\"\nsend \\\"y\\r\\\"\nexpect eof\n\")\n\n    printf
      \"$secure_mysql\\n\"\n}\n\n\n###########################################################\n#
      PHP functions\n###########################################################\n\nfunction
      php_install_with_apache {\n    # Install PHP\n\n    case \"${detected_distro[family]}\"
      in\n        ''debian'')\n            case \"${detected_distro[version]}\" in\n                ''14.04''
      | ''8'')\n                    system_install_package php5 php5-mysql libapache2-mod-php5\n                    ;;\n                *)\n                    system_install_package
      php php-mysql libapache2-mod-php\n                    ;;\n            esac\n\n            #
      Restart apache2\n            systemctl restart apache2\n            ;;\n        ''redhat'')\n            system_install_package
      php php-pear\n            system_install_package php-mysqli\n\n            #
      Restart httpd\n            systemctl restart httpd\n            ;;\n    esac\n}\n\nfunction
      php_tune {\n    # Tunes PHP to utilize up to 32M per process\n\n    case \"${detected_distro[family]}\"
      in\n        ''debian'')\n            local -r PHPVER=\"$(php_detect_version)\"\n\n            sed
      -i''-orig'' ''s/memory_limit = [0-9]\\+M/memory_limit = 32M/'' /etc/php/\"$PHPVER\"/apache2/php.ini\n            sed
      -i''-orig'' ''s/max_input_time = 60/max_input_time = 30/'' /etc/php/\"$PHPVER\"/apache2/php.ini\n            sed
      -i''-orig'' ''s/error_reporting = E_ALL & ~E_DEPRECATED & ~E_STRICT/error_reporting
      = E_COMPILE_ERROR | E_RECOVERABLE_ERROR | E_ERROR | E_CORE_ERROR/'' /etc/php/\"$PHPVER\"/apache2/php.ini\n            sed
      -i''-orig'' ''s/;error_log = php_errors.log/error_log = /var/log/php/error.log/''
      /etc/php/\"$PHPVER\"/apache2/php.ini\n            ;;\n        ''redhat'')\n            sed
      -i''-orig'' ''s/max_input_time = 60/max_input_time = 30/'' /etc/php.ini\n            sed
      -i''-orig'' ''s/error_reporting = E_ALL & ~E_DEPRECATED & ~E_STRICT/error_reporting
      = E_COMPILE_ERROR | E_RECOVERABLE_ERROR | E_ERROR | E_CORE_ERROR/'' /etc/php.ini\n            sed
      -i''-orig'' ''s/;error_log = php_errors.log/error_log = /var/log/php/error.log/''
      /etc/php.ini\n            ;;\n    esac\n\n    # Create the log directory for
      PHP and give ownership to the Apache system user\n    # Also, restart Apache\n    mkdir
      /var/log/php\n\n    case \"${detected_distro[family]}\" in\n        ''debian'')\n            chown
      www-data /var/log/php\n            systemctl restart apache2\n            ;;\n        ''redhat'')\n            chown
      apache /var/log/php\n            systemctl restart httpd\n            ;;\n    esac\n}\n\nfunction
      php_detect_version {\n    local -r php_version=\"$(\n        php -v | awk -F.
      ''/built/{print $1 $2}'' | awk ''{print $2}''\n    )\"\n\n    printf \"${php_version:0:1}.${php_version:1:1}\\n\"\n}\n\n###########################################################\n#
      Postfix\n###########################################################\n\nfunction
      postfix_install_loopback_only {\n    # Installs postfix and configure to listen
      only on the local interface\n    # Also allows for local mail delivery\n    case
      \"${detected_distro[family]}\" in\n        ''debian'')\n            echo \"postfix
      postfix/main_mailer_type select Internet Site\" | debconf-set-selections\n            echo
      \"postfix postfix/mailname string localhost\" | debconf-set-selections\n            echo
      \"postfix postfix/destinations string localhost.localdomain, localhost\" | debconf-set-selections\n            system_install_package
      postfix\n            /usr/sbin/postconf -e \"inet_interfaces = loopback-only\"\n            ;;\n    esac\n\n    [
      \"${detected_distro[distro]}\" == ''fedora'' ] && system_install_package postfix\n\n    #
      postfix was pre-installed and configured for local mail delivery in my\n    #
      tests with CentOS 7, but still needed to be restarted or it produced\n    #
      an error when sending mail\n    systemctl restart postfix\n}\n\nfunction postfix_install_smtp_only
      {\n    local -r fqdn=\"$1\"\n\n    echo \"postfix postfix/mailname string $fqdn\"
      | debconf-set-selections\n    echo \"postfix postfix/main_mailer_type string
      ''Internet Site''\" | debconf-set-selections\n\n    system_install_package mailutils
      postfix\n\n    sed -i ''s/inet_interfaces = all/inet_interfaces = loopback-only/''
      /etc/postfix/main.cf\n}\n\n\n###########################################################\n#
      Other niceties!\n###########################################################\n\nfunction
      goodstuff {\n    # Removed the code to install wget, less, and vim, as they
      seem to be already installed\n    # Will think of some things to add to this
      later\n    # Enable the \"ll\" list long alias and colorful root Bash prompt\n\n    sed
      -i -e ''s/^#PS1=/PS1=/'' /root/.bashrc\n    sed -i -e \"s/^#alias ll=''ls -l''/alias
      ll=''ls -al''/\" /root/.bashrc\n}\n\nfunction all_set {\n    [ \"${detected_distro[family]}\"
      == ''debian'' ] && debian_upgrade\n\n    printf \"The StackScript has completed
      successfully.\\n\"\n    touch \"/root/.ss-complete\"\n}\n\n\n###########################################################\n#
      Utility functions\n###########################################################\n\nfunction
      restartServices {\n    # restarts services that have a file in /tmp/restart-*\n    for
      service in $(ls /tmp/ | grep ''restart-'' | cut -d- -f2-10); do\n        # Restart
      the services and delete the restart file from /tmp\n        systemctl restart
      \"$service\"\n        rm -f \"/tmp/restart-${service}\"\n    done\n}\n\nfunction
      randomString {\n    if [ ! -n \"$1\" ];\n        then length=20\n        else
      length=\"$1\"\n    fi\n\n    # Generate a random string\n    echo \"$(</dev/urandom
      tr -dc A-Za-z0-9 | head -c $length)\"\n}\n\nfunction certbot_ssl {\n    # Installs
      a Certbot SSL cert with a basic HTTPS re-direct for\n    # Apache or NGINX.
      Defaults to Apache if no webserver is specified\n    local -r fqdn=\"$1\" soa_email_address=\"$2\"
      webserver=\"${3:-apache}\"\n    local -r ip_address=\"$(system_primary_ip)\"\n\n    [
      ! \"$(echo \"$webserver\" | egrep \"^apache$|^nginx$\")\" ] && {\n        printf
      \"%s is not a valid option.\\n\" \"$webserver\"\n        exit 1;\n    }\n\n    #
      Check for propagation and then get a certificate\n    if [ \"$fqdn\" ]; then\n        #
      Install Certbot\n        system_install_package python-certbot-\"${webserver}\"\n\n        check_dns_propagation
      \"$fqdn\" \"$ip_address\"\n        sleep 5\n\n        # Get a certificate and
      re-direct all traffic to HTTPS\n        # In case of failure, try a few times,
      but not so many\n        # that certbot imposes their rate limit (50/week)\n        declare
      x=3\n        while [ $x -gt 0 ]; do\n            if ! certbot -n --\"${webserver}\"
      --agree-tos --redirect \\\n                       -d \"$fqdn\" -m \"$soa_email_address\";
      then\n                ((x-=1))\n            else\n                break;\n            fi\n        done\n\n        #
      Configure auto-renewal for the certificate\n        crontab -l > cron\n        echo
      \"* 1 * * 1 /etc/certbot/certbot renew\" >> cron\n        crontab cron\n        rm
      cron\n    fi\n}\n\n\n###########################################################\n#
      OS Detection Stuff\n###########################################################\n\n#
      Store detected distribution information in a globally-scoped Associative Array\nreadonly
      dist=\"$(detect_distro ''distro'')\"\nreadonly fam=\"$(detect_distro ''family'')\"\nreadonly
      -A detected_distro=\"(\n    [distro]=\"${dist,,}\" \\\n    [family]=\"${fam,,}\"
      \\\n    [version]=\"$(detect_distro ''version'')\"\n    [version_major]=\"$(detect_distro
      ''version'' | cut -d. -f1)\"\n    [version_minor]=\"$(detect_distro ''version''
      | cut -d. -f2)\"\n)\"\n\n\n\n\n###########################################################\n#
      Other functions\n###########################################################\n\nfunction
      get_started {\n    local -r subdomain=\"$1\" domain=\"$2\" ip=\"$3\"\n\n    if
      [ \"$domain\" ]; then\n        if [ \"$subdomain\" ]; then\n            local
      -r fqdn=\"${subdomain}.${domain}\"\n        else\n            local -r fqdn=\"$domain\"\n        fi\n        local
      -r hostname=\"$domain\"\n    else\n        local -r hostname=\"$(dnsdomainname
      -A | awk ''{print$1}'')\"\n        local -r fqdn=$hostname\n    fi\n\n    #
      Set the hostname and Fully Qualified domain Name (fqdn) in the /etc/hosts file\n    printf
      \"Setting IP Address (%s), fqdn (%s), and hostname (%s) in /etc/hosts...\\n\"
      \"$ip\" \"$fqdn\" \"$hostname\"\n    system_add_host_entry \"$ip\" \"$fqdn\"
      \"$hostname\"\n\n    # Run initial updates\n    system_update\n\n    # Set the
      hostname\n    system_set_hostname \"$hostname\"\n}\n\nfunction secure_server
      {\n    # Performs basic security configurations for a new Linode\n    # Follows
      the basic steps oulined in Linode''s ''How to Secure Your Server'' guide -\n    #   https://www.linode.com/docs/security/securing-your-server\n    #\n    #
      $1 - The username for the limited sudo user\n    # $2 - The password for the
      limited sudo user\n    # $3 - Public Key to be used for SSH authentication\n    [
      ! -n \"$1\" ] && {\n        printf \"secure_server() requires the username for
      the limited sudo user as its first argument\\n\"\n        return 1;\n    }\n    [
      ! -n \"$2\" ] && {\n        printf \"secure_server() requires the password for
      the limited sudo user as its second argument\\n\"\n        return 1;\n    }\n    [
      ! -n \"$3\" ] && {\n        printf \"secure_server() requires the Public Key
      to be used for SSH authentication as its third argument\\n\"\n        return
      1;\n    }\n    local -r user=\"$1\" password=\"$2\" pubkey=\"$3\"\n\n    # Create
      the user and add give it ''sudo'' privileges\n    # This function needs updating
      for systems that use the ''wheel'' group\n    user_add_sudo \"$user\" \"$password\"\n\n    #
      Configure Public Key Authentication, disable root, and restart SSHd\n    user_add_pubkey
      \"$user\" \"$pubkey\"\n    ssh_disable_root\n\n    # Configure basic firewall
      rules\n    configure_basic_firewall\n\n    # Install and enable fail2ban\n    enable_fail2ban\n}\n\n\n###########################################################\n#
      LAMP Stack functions\n###########################################################\n\nfunction
      lamp_stack {\n    # $1 - required - MySQL database name\n    # $2 - required
      - MySQL database root password\n    # $3 - required - MySQL database username\n    #
      $4 - required - MySQL database user''s password\n    # $5 - optional - Hostname
      of the VirtualHost to configure\n    [ ! -n \"$1\" ] && {\n        printf \"nc_lamp_stack()
      requires the MySQL database name as it''s first argument\\n\"\n    }\n    [
      ! -n \"$2\" ] && {\n        printf \"nc_lamp_stack() requires the MySQL database
      password as it''s second argument\\n\"\n        return 1;\n    }\n    [ ! -n
      \"$3\" ] && {\n        printf \"nc_lamp_stack() requires the MySQL database
      username as it''s third argument\\n\"\n        return 1;\n    }\n    [ ! -n
      \"$4\"} ] && {\n        printf \"nc_lamp_stack() requires the MySQL database
      user''s password as it''s fourth argument\\n\"\n        return 1;\n    }\n    local
      -r db_name=\"$1\" db_root_password=\"$2\" db_username=\"$3\" db_user_password=\"$4\"\n    [
      \"$5\" ] && local -r vhost=\"$5\"\n\n    # Install Apache, MySQL, and PHP\n    apache_install\n    mysql_install
      \"$db_root_password\"\n    php_install_with_apache\n\n    # Configure the VirtualHost,
      if applicable\n    [ \"$vhost\" ] && apache_virtualhost \"$vhost\"\n\n    #
      Configure the MySQL database\n    mysql_configure \"$db_name\" \"$db_root_password\"
      \"$db_username\" \"$db_user_password\"\n}\n\n###########################################################\n#
      Wordpress functions\n###########################################################\n\nfunction
      wordpress_install {\n    # Installs the latest wordpress tarball from wordpress.org\n\n    #
      $1 - required - The existing virtualhost to install into\n    # $2 - required
      - The MySQL database root password\n    # $3 - required - The Wordpress password\n    [
      ! -n \"$1\" ] && {\n        printf \"wordpress_install() requires the vitualhost
      as its first argument\\n\"\n        return 1;\n    }\n    [ ! -n \"$2\" ] &&
      {\n        printf \"wordpress_install() requires the MySQL database root password
      as its second argument\\n\"\n        return 1;\n    }\n    [ ! -n \"$3\" ] &&
      {\n        printf \"wordpress_install() requires the Wordpress password as its
      third argument\\n\"\n        return 1;\n    }\n    local -r vhost=\"$1\" db_root_password=\"$2\"
      wp_pass=\"$3\"\n\n    # We need wget for this. Check if its installed, and install
      it if not\n    [ ! -e /usr/bin/wget ] && system_install_package wget\n\n    #
      Determine the Document Root for the configured VirtualHost, and produce an\n    #
      error if it can''t be determined\n    vpath=\"$(apache_virtualhost_get_docroot
      \"$vhost\")\"\n    [ ! -n \"$vpath\" ] && {\n        printf \"Could not determine
      DocumentRoot for %s\\n\" \"$vhost\"\n        return 1;\n    }\n    local -r
      wp_path=\"${vpath}wordpress\"\n\n    # Download, extract, chown, and get our
      config file started\n    cd \"$vpath\"\n    wget http://wordpress.org/latest.tar.gz\n    tar
      xfz latest.tar.gz\n    cp \"$wp_path\"/wp-config-sample.php \"$wp_path\"/wp-config.php\n    \n    case
      \"${detected_distro[family]}\" in\n        ''debian'')\n            # Set appropriate
      permissions\n            chown -R www-data: \"${wp_path}\"\n            chown
      www-data \"${wp_path}\"/wp-config.php\n            ;;\n        ''redhat'')\n            if
      [ \"${detected_distro[distro]}\" == ''centos'' ]; then\n                # CentOS
      7''s default repos contain an outdated PHP, but Wordpress\n                #
      requires the newer versions, so wee need to add a repo and a tool\n                system_install_package
      http://rpms.remirepo.net/enterprise/remi-release-7.rpm\n                system_install_package
      yum-utils\n\n                # Enable the repo which contains the latest PHP
      version\n                yum-config-manager --enable remi-php73\n\n                #
      Install PHP 7\n                system_install_package php php-pear php-mysql\n            fi\n\n            #
      More permissions\n            chown -R apache:apache \"$wp_path\"\n            chown
      apache \"$wp_path\"/wp-config.php\n            ;;\n    esac\n\n    # Even more
      permissions\n    chmod 640 \"$wp_path\"/wp-config.php\n\n    # Database configuration\n    mysql_create_database
      \"$db_root_password\" wordpress\n    mysql_create_user \"$db_root_password\"
      wordpress \"$wp_pass\"\n    mysql_grant_user \"$db_root_password\" wordpress
      wordpress\n\n    # Configuration file updates\n    for i in {1..4}\n        do
      sed -i \"0,/put your unique phrase here/s/put your unique phrase here/$(randomString
      50)/\" \"$wp_path\"/wp-config.php\n    done\n    sed -i ''s/database_name_here/wordpress/''
      \"$wp_path\"/wp-config.php\n    sed -i ''s/username_here/wordpress/'' \"$wp_path\"/wp-config.php\n    sed
      -i \"s/password_here/$wp_pass/\" \"$wp_path\"/wp-config.php\n\n    # Update
      the VirtualHost file to point to the wordpress installation and restart apache2\n    case
      \"${detected_distro[family]}\" in\n        ''debian'')\n            sed -i ''s/public_html/public_html/wordpress/''
      /etc/apache2/sites-available/\"$vhost\".conf\n            systemctl restart
      apache2\n            ;;\n        ''redhat'')\n            sed -i ''s/public_html/public_html/wordpress/''
      /etc/httpd/conf.d/vhost.conf\n            systemctl restart httpd\n            ;;\n    esac\n}\n\nfunction
      ufw_install {\n    # Install UFW and add basic rules\n    system_install_package
      ufw\n\n    ufw default allow outgoing\n    ufw default deny incoming\n    ufw
      allow ssh\n    ufw enable\n    systemctl enable ufw\n\n    # Stop flooding Console
      with messages\n    ufw logging off\n}\n\nfunction stackscript_cleanup {\n    [
      \"${detected_distro[family]}\" == ''debian'' ] && debian_upgrade\n\n    # Force
      IPv4 and noninteractive upgrade after script runs to prevent breaking nf_conntrack
      for UFW\n    echo ''Acquir1234::5678orceIPv4 \"true\";'' > /etc/apt/apt.conf.d/99force-ipv4\n\n    #
      Clean up\n    rm /root/StackScript\n    rm /root/ssinclude*\n    echo \"Installation
      complete!\"\n}", "user_defined_fields": []}, {"id": 1193851, "username": "jrzavaschi1992",
