      Label=\"MySQL User Password\" example=\"s3cur3_9a55w04d\"/>\n\n## Linode/SSH
      Security Settings\n#<UDF name=\"username\" label=\"The limited sudo user to
      be created for the Linode\" default=\"\">\n#<UDF name=\"password\" label=\"The
      password for the limited sudo user\" example=\"an0th3r_s3cure_p4ssw0rd\" default=\"\">\n#<UDF
      name=\"pubkey\" label=\"The SSH Public Key that will be used to access the Linode\"
      default=\"\">\n#<UDF name=\"disable_root\" label=\"Disable root access over
      SSH?\" oneOf=\"Yes,No\" default=\"No\">\n\n## Domain Settings\n#<UDF name=\"token_password\"
      label=\"Your Linode API token. This is needed to create your WordPress server''s
      DNS records\" default=\"\">\n#<UDF name=\"subdomain\" label=\"Subdomain\" example=\"The
      subdomain for the DNS record: www (Requires Domain)\" default=\"\">\n#<UDF name=\"domain\"
      label=\"Domain\" example=\"The domain for the DNS record: example.com (Requires
      API token)\" default=\"\">\n\n## Enable logging\nexec > >(tee /dev/ttyS0 /var/log/stackscript.log)
      2>&1\nset -xo pipefail\n\n# Source the Linode Bash StackScript, API, and OCA
      Helper libraries\nsource <ssinclude StackScriptID=1>\nsource <ssinclude StackScriptID=632759>\nsource
      <ssinclude StackScriptID=401712>\n\n# Source and run the New Linode Setup script
      for DNS/SSH configuration\nsource <ssinclude StackScriptID=666912>\n\nfunction
      lampjoomla {\n    apt-get install apache2 mariadb-server php php-common libapache2-mod-php
      php-cli php-fpm php-mysql php-json php-opcache php-gmp php-curl php-intl php-mbstring
      php-xmlrpc php-gd php-xml php-zip -y\n    PHP_VERSION=$(php -r \"echo PHP_MAJOR_VERSION.''.''.PHP_MINOR_VERSION;\")\n    cat
      <<END > /etc/php/$PHP_VERSION/apache2/php.ini\nmemory_limit = 512M\nupload_max_filesize
      = 256M\npost_max_size = 256M \nmax_execution_time = 300\noutput_buffering =
      off\ndisplay_errors = off\nupload_tmp_dir = \"/var/www/html/joomla/tmp\"\nEND\n}\n\nfunction
      databaseconf {\n    run_mysql_secure_installation\n    mysql -uroot -p$DBROOT_PASSWORD
      -e \"CREATE DATABASE joomla_db;\"\n    mysql -uroot -p$DBROOT_PASSWORD -e \"CREATE
      USER ''joomla''@''localhost'' IDENTIFIED BY ''$DBUSER_PASSWORD'';\"\n    mysql
      -uroot -p$DBROOT_PASSWORD -e \"GRANT ALL PRIVILEGES ON joomla_db.* TO ''joomla''@''localhost'';\"\n}\n\nfunction
      apachejoomla {\n    apt-get install wget unzip -y\n    mkdir -p /var/www/html/joomla\n    cd
      /tmp && wget https://downloads.joomla.org/cms/joomla4/4-1-0/Joomla_4-1-0-Stable-Full_Package.zip?format=zip\n    unzip
      Joomla_4* -d /var/www/html/joomla\n    chown -R www-data:www-data /var/www/html/joomla
      \n    chmod -R 755 /var/www/html/joomla\n    cat <<END > /etc/apache2/sites-available/joomla.conf\n<VirtualHost
      *:80>\n     ServerAdmin $SOA_EMAIL_ADDRESS\n      DocumentRoot /var/www/html/joomla\n     ServerName
      $FQDN\n\n     <Directory /var/www/html/joomla>\n          Options FollowSymlinks\n          AllowOverride
      All\n          Require all granted\n     </Directory>\n\n     ErrorLog ${APACHE_LOG_DIR}/$FQDN_error.log\n     CustomLog
      ${APACHE_LOG_DIR}/$FQDN_access.log combined\n\n</VirtualHost>\nEND\n    a2ensite
      joomla.conf\n    a2enmod rewrite\n    a2enmod php$PHP_VERSION\n    a2dissite
      000-default.conf\n    systemctl restart apache2\n\n    ufw allow http\n    ufw
      allow https\n}\nfunction ssljoomla {\n    apt install certbot python3-certbot-apache
      -y\n    certbot_ssl \"$FQDN\" \"$SOA_EMAIL_ADDRESS\" ''apache''\n}\n\nfunction
      main {\n    lampjoomla\n    databaseconf\n    apachejoomla\n    ssljoomla\n    stackscript_cleanup\n}\n#
      Execute script\nmain", "user_defined_fields": [{"name": "soa_email_address",
