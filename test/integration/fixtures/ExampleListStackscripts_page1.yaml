      "rev_note": "", "script": "#!/bin/bash\n#\n# Bootstrap installs Windows ISO
      to a Linode from a temporary block storage volume.\n# by Kit Knox - Akamai Technologies\n#\n#
      - Downloads ISO directly from Microsoft\n# - Overlays VirtIO Drivers into ISO\n#
      - Deploys ISO as Bootable USB on recovery partition on main raw disk\n# - Deploys
      autounattend.xml to fully automate installation of Windows and enabling of Remote
      Desktop\n#\n#<UDF name=\"TOKEN\" Label=\"Linode API Token\" />\n#<UDF name=\"WINDOWS_PASSWORD\"
      Label=\"Administrator Password for Windows\" example=\"Password\" />\n#<UDF
      name=\"INSTALL_WINDOWS_VERSION\" Label=\"Windows Version\" oneOf=\"w11,2k22\"
      default=\"2k22\"/>\n#<UDF name=\"AUTOLOGIN\" Label=\"Auto Login to Windows\"
      oneOf=\"true,false\" default=\"true\"/>\n#<UDF name=\"W11_ISO_URL\" Label=\"Windows
      11 ISO URL (Not Required For Windows Server) - Get Fresh URL From https://www.microsoft.com/en-us/software-download/windows11\"
      default=\"NOURL\"/>\n\n# Replaced with values from StackScript UDF\n#TOKEN=\n#WINDOWS_PASSWORD=\n#INSTALL_WINDOWS_VERSION=\n#AUTOLOGIN=\n#W11_ISO_URL=\nW2K22_ISO_URL=''https://go.microsoft.com/fwlink/p/?LinkID=2195280&clcid=0x409&culture=en-us&country=US''\n\n#
      STAGE changes dynamically as install progresses\nSTAGE=1\n# Persist UDF variables
      for future stages after reboot\nif [ $STAGE == 1 ]; then\n  sed -i \"s/^#TOKEN=/TOKEN=$TOKEN/\"
      /root/StackScript\n  sed -i \"s/^#WINDOWS_PASSWORD=/WINDOWS_PASSWORD=\\\"$(echo
      $WINDOWS_PASSWORD | sed -e ''s/\\\\/\\\\\\\\/g; s/\\//\\\\\\//g; s/&/\\\\\\&/g'')\\\"/\"
      /root/StackScript\n  sed -i \"s/^#INSTALL_WINDOWS_VERSION=/INSTALL_WINDOWS_VERSION=$INSTALL_WINDOWS_VERSION/\"
      /root/StackScript\n  sed -i \"s/^#AUTOLOGIN=/AUTOLOGIN=$AUTOLOGIN/\" /root/StackScript\n  sed
      -i \"s/^#W11_ISO_URL=/W11_ISO_URL=\\\"$(echo $W11_ISO_URL | sed -e ''s/\\\\/\\\\\\\\/g;
      s/\\//\\\\\\//g; s/&/\\\\\\&/g'')\\\"/\" /root/StackScript\nfi\n\nstage1() {\n  echo
      \"Stage 1 started\"\n  export LINODE_ID=`dmidecode -t1 | grep Serial | awk ''{print
      $3}''`\n  ROOT_UUID=`lsblk -o UUID,MOUNTPOINT -P |  grep ''MOUNTPOINT=\"/\"''
      | sed ''s/[0-9]*$//'' | awk ''{print $1}'' | sed ''s/UUID=\"//'' | sed ''s/\"//''`\n  if
      ! [ $LINODE_ID -gt 0 ]; then\n    echo \"Invalid LinodeID\"\n    exit\n  fi\n  if
      ! [ -f \"/usr/bin/jq\" ]; then\n    echo \"jq package missing\"\n    export
      DEBIAN_FRONTEND=noninteractive\n    apt update\n    apt install -yq jq wimtools
      genisoimage libwin-hivex-perl\n  fi\n  if ! [ -e \"/dev/disk/by-id/scsi-0Linode_Volume_temp-$LINODE_ID\"
      ]; then\n    echo \"LinodeID: $LINODE_ID - Creating Block Storage Volume\"\n    curl
      -sH \"Content-Type: application/json\" \\\n      -H \"Authorization: Bearer
      $TOKEN\" \\\n      -X POST -d \"{\n        \\\"label\\\": \\\"temp-$LINODE_ID\\\",\n        \\\"size\\\":
      30,\n        \\\"linode_id\\\": $LINODE_ID\n      }\" \\\n      https://api.linode.com/v4/volumes
      | json_pp\n  fi\n  while ! [ -e \"/dev/disk/by-id/scsi-0Linode_Volume_temp-$LINODE_ID\"
      ]\n  do\n    echo \"Waiting for block storage volume.\"\n    sleep 5\n  done\n  echo
      \"Found block storage volume for Linode ID: $LINODE_ID\"\n  if ! lsblk -f \"/dev/disk/by-id/scsi-0Linode_Volume_temp-$LINODE_ID\"
      | grep ext4 > /dev/null; then\n    echo \"No filesystem found, creating.\"\n    mkfs.ext4
      -U $ROOT_UUID \"/dev/disk/by-id/scsi-0Linode_Volume_temp-$LINODE_ID\"\n  fi  \n  mkdir
      \"/mnt/temp-$LINODE_ID\"\n  mount  \"/dev/disk/by-id/scsi-0Linode_Volume_temp-$LINODE_ID\"
      /mnt/temp-$LINODE_ID\n  VOLUME_ID=`curl -sH \"Authorization: Bearer $TOKEN\"     https://api.linode.com/v4/volumes
      | jq \".data[] | select (.label == \\\"temp-$LINODE_ID\\\") | .id\"`\n  echo
      \"Block Storage Volume ID: $VOLUME_ID\"\n\n  BLOCK_CONFIG_ID=`curl -sH \"Authorization:
      Bearer $TOKEN\" \\\n      https://api.linode.com/v4/linode/instances/$LINODE_ID/configs
      | jq ''.data[] | select (.label == \"BLOCK\") | .id''`\n  NEW_CONFIG=`curl -sH
      \"Authorization: Bearer $TOKEN\" \\\n    https://api.linode.com/v4/linode/instances/$LINODE_ID/configs
      | jq \".data[] | select (.label|test(\\\"My (Ubuntu|Debian).*\\\"))\" | jq ''.kernel
      = \"linode/grub2\"'' | jq '' .devices.sda.disk_id = null | .devices.sda.disk_id
      = null | .devices.sdc.disk_id = null | .devices.sdd = null | .devices.sdb =
      null | .root_device = \"/dev/sda\"'' | jq \" .devices.sda.volume_id = $VOLUME_ID\"
      | jq \" .devices.sdc = null\" | grep -v \"\\\"id\\\":\" | jq ''.label = \"BLOCK\"''
      | grep -v \"\\\"created\\\":\" | grep -v \"\\\"updated\\\":\"`\n\n  echo \"##
      New Config\"\n  echo \"$NEW_CONFIG\" | jq\n\n  if ! [ $BLOCK_CONFIG_ID -gt 0
      ]; then\n    echo \"BLOCK config doesn''t exist, creating.\"\n    curl -sH \"Content-Type:
      application/json\" \\\n        -H \"Authorization: Bearer $TOKEN\" \\\n        -X
      POST -d \"$NEW_CONFIG\"\\\n        https://api.linode.com/v4/linode/instances/$LINODE_ID/configs
      | jq\n  else\n    echo \"BLOCK config exists, updating.\"\n    curl -sH \"Content-Type:
      application/json\" \\\n        -H \"Authorization: Bearer $TOKEN\" \\\n        -X
      PUT -d \"$NEW_CONFIG\"\\\n        https://api.linode.com/v4/linode/instances/$LINODE_ID/configs/$BLOCK_CONFIG_ID
      | jq\n  fi\n\n  BLOCK_CONFIG_ID=`curl -sH \"Authorization: Bearer $TOKEN\" \\\n      https://api.linode.com/v4/linode/instances/$LINODE_ID/configs
      | jq ''.data[] | select (.label == \"BLOCK\") | .id''`\n  echo \"BLOCK ConfigID:
      $BLOCK_CONFIG_ID\"\n\n  echo \"rsync started\"\n  rsync -aAX / /mnt/temp-$LINODE_ID/
      --exclude /sys/ --exclude /proc/ --exclude /dev/ --exclude /tmp/ --exclude /media/
      --exclude /mnt/ --exclude /run/\n  mkdir /mnt/temp-$LINODE_ID/sys /mnt/temp-$LINODE_ID/proc
      /mnt/temp-$LINODE_ID/dev /mnt/temp-$LINODE_ID/tmp /mnt/temp-$LINODE_ID/media
      /mnt/temp-$LINODE_ID/mnt /mnt/temp-$LINODE_ID/run\n  echo \"rsync finished\"\n  #
      Remove swap from fstab\n  grep -v swap /mnt/temp-$LINODE_ID/etc/fstab > fstab.new\n  cp
      fstab.new /mnt/temp-$LINODE_ID/etc/fstab\n  rm fstab.new\n  cp $0 /mnt/temp-$LINODE_ID/etc/rc.local\n  chmod
      +x /mnt/temp-$LINODE_ID/rc.local\n  sed -i \"s/STAGE=1/STAGE=2/\" /mnt/temp-$LINODE_ID/etc/rc.local\n  \n  #
      Reboot\n  curl -sH \"Content-Type: application/json\" \\\n      -H \"Authorization:
      Bearer $TOKEN\" \\\n      -X POST -d \"{\\\"config_id\\\": $BLOCK_CONFIG_ID}\"
      \\\n      https://api.linode.com/v4/linode/instances/$LINODE_ID/reboot | jq\n}\n\nstage2()
      {\n  echo \"Stage 2 started\"\n  export LINODE_ID=`dmidecode -t1 | grep Serial
      | awk ''{print $3}''`\n  if ! [ $LINODE_ID -gt 0 ]; then\n    echo \"Invalid
      LinodeID\"\n    exit\n  fi\n  ROOT_DISK_ID=`curl -sH \"Authorization: Bearer
      $TOKEN\" \\\n      https://api.linode.com/v4/linode/instances/$LINODE_ID/disks
      | jq \".data[] | select (.label|test(\\\"(Ubuntu|Debian).*\\\")) | .id\"`\n  echo
      \"Root Disk ID: $ROOT_DISK_ID\"\n  echo \"Deleting Root Disk\"\n  curl -sH \"Authorization:
      Bearer $TOKEN\" \\\n      -X DELETE \\\n      https://api.linode.com/v4/linode/instances/$LINODE_ID/disks/$ROOT_DISK_ID\n  while
      [ $ROOT_DISK_ID -gt 0 ]; do\n    echo \"Root disk still exist.  Waiting.\"\n    sleep
      5\n    ROOT_DISK_ID=`curl -sH \"Authorization: Bearer $TOKEN\" \\\n        https://api.linode.com/v4/linode/instances/$LINODE_ID/disks
      | jq \".data[] | select (.label|test(\\\"(Ubuntu|Debian).*\\\")) | .id\"`\n    echo
      \"ROOT_DISK_ID: $ROOT_DISK_ID\"\n  done\n  SWAP_DISK_ID=`curl -sH \"Authorization:
      Bearer $TOKEN\" \\\n      https://api.linode.com/v4/linode/instances/$LINODE_ID/disks
      | jq \".data[] | select (.label|test(\\\"(Swap).*\\\")) | .id\"`\n  echo \"SWAP
      Disk ID: $SWAP_DISK_ID\"\n  echo \"Deleting Swap Disk\"\n  curl -sH \"Authorization:
      Bearer $TOKEN\" \\\n      -X DELETE \\\n      https://api.linode.com/v4/linode/instances/$LINODE_ID/disks/$SWAP_DISK_ID\n  while
      [ $SWAP_DISK_ID -gt 0 ]; do\n    echo \"Swap disk still exist.  Waiting.\"\n    sleep
      5\n    SWAP_DISK_ID=`curl -sH \"Authorization: Bearer $TOKEN\" \\\n        https://api.linode.com/v4/linode/instances/$LINODE_ID/disks
      | jq \".data[] | select (.label|test(\\\"(Swap).*\\\")) | .id\"`\n    echo \"ROOT_DISK_ID:
      $ROOT_DISK_ID\"\n  done\n  LINODE_INSTANCE_TYPE=`dmidecode -t1|grep \"Family\"
      | awk ''{print $2}'' | sed ''s/Linode.//''`\n  LINODE_DISK_MAX=`curl https://api.linode.com/v4/linode/types
      | jq \".data[] | select (.id == \\\"$LINODE_INSTANCE_TYPE\\\") | .disk\"`\n  echo
      \"DISK_MAX: $LINODE_DISK_MAX\"\n  NEW_DISK_SIZE=$(($LINODE_DISK_MAX))\n\n  echo
      \"Instance Type: $LINODE_INSTANCE_TYPE - New Size: $NEW_DISK_SIZE\"\n  curl
      -sH \"Content-Type: application/json\" \\\n      -H \"Authorization: Bearer
      $TOKEN\" \\\n      -X POST -d \"{\n        \\\"label\\\": \\\"Windows\\\",\n        \\\"filesystem\\\":
      \\\"raw\\\",\n        \\\"size\\\": $NEW_DISK_SIZE\n      }\" \\\n      https://api.linode.com/v4/linode/instances/$LINODE_ID/disks
      | jq\n\n  RAW_DISK_ID=`curl -sH \"Authorization: Bearer $TOKEN\" \\\n        https://api.linode.com/v4/linode/instances/$LINODE_ID/disks
      | jq \".data[] | select (.label == \\\"Windows\\\") | .id\"`\n  echo \"RAW_DISK_ID:
      $RAW_DISK_ID\"\n  BLOCK_CONFIG_ID=`curl -sH \"Authorization: Bearer $TOKEN\"
      \\\n      https://api.linode.com/v4/linode/instances/$LINODE_ID/configs | jq
      ''.data[] | select (.label == \"BLOCK\") | .id''`\n\n  NEW_CONFIG=`curl -sH
      \"Authorization: Bearer $TOKEN\" \\\n      https://api.linode.com/v4/linode/instances/$LINODE_ID/configs
      | jq ''.data[] | select (.label == \"BLOCK\")'' | jq '' .devices.sdb = null''
      | jq \" .devices.sdb.disk_id = $RAW_DISK_ID\" | grep -v \"\\\"id\\\":\" | jq
      ''.label = \"BLOCK\"'' | grep -v \"\\\"created\\\":\" | grep -v \"\\\"updated\\\":\"`\n\n  echo
      \"## New Config\"\n  echo \"$NEW_CONFIG\" | jq\n  echo\n\n  if ! [ $BLOCK_CONFIG_ID
      -gt 0 ]; then\n    echo \"## BLOCK config doesn''t exist, creating.\"\n    curl
      -sH \"Content-Type: application/json\" \\\n        -H \"Authorization: Bearer
      $TOKEN\" \\\n        -X POST -d \"$NEW_CONFIG\"\\\n        https://api.linode.com/v4/linode/instances/$LINODE_ID/configs
      | jq\n  else\n    echo \"## BLOCK config exists, updating.\"\n    curl -sH \"Content-Type:
      application/json\" \\\n        -H \"Authorization: Bearer $TOKEN\" \\\n        -X
      PUT -d \"$NEW_CONFIG\"\\\n        https://api.linode.com/v4/linode/instances/$LINODE_ID/configs/$BLOCK_CONFIG_ID
      | jq\n  fi\n\n  BLOCK_CONFIG_ID=`curl -sH \"Authorization: Bearer $TOKEN\" \\\n      https://api.linode.com/v4/linode/instances/$LINODE_ID/configs
      | jq ''.data[] | select (.label == \"BLOCK\") | .id''`\n  echo \"## BLOCK Config:
      $BLOCK_CONFIG_ID\"\n\n  sed -i \"s/STAGE=2/STAGE=3/\" /etc/rc.local\n\n  sleep
      10\n  curl -sH \"Content-Type: application/json\" \\\n      -H \"Authorization:
      Bearer $TOKEN\" -X POST\\\n      https://api.linode.com/v4/linode/instances/$LINODE_ID/reboot
      | jq\n}\n\nstage3() {\n\n  export LINODE_ID=`dmidecode -t1 | grep Serial | awk
      ''{print $3}''`\n  if ! [ $LINODE_ID -gt 0 ]; then\n    echo \"Invalid LinodeID\"\n    exit\n  fi\n  RAW_DISK_ID=`curl
      -sH \"Authorization: Bearer $TOKEN\" \\\n        https://api.linode.com/v4/linode/instances/$LINODE_ID/disks
      | jq \".data[] | select (.label == \\\"Windows\\\") | .id\"`\n   echo \"RAW_DISK_ID:
      $RAW_DISK_ID\"\n\n  WINDOWS_CONFIG_ID=`curl -sH \"Authorization: Bearer $TOKEN\"
      \\\n      https://api.linode.com/v4/linode/instances/$LINODE_ID/configs | jq
      ''.data[] | select (.label == \"Windows\") | .id''`\n\n  NEW_CONFIG=`curl -sH
      \"Authorization: Bearer $TOKEN\" \\\n      https://api.linode.com/v4/linode/instances/$LINODE_ID/configs
      | jq ''.data[] | select (.label == \"BLOCK\")'' | jq '' .kernel = \"linode/direct-disk\"
      | .devices.sda.volume_id = null | .devices.sdb = null | .devices.sdc = null
      | .root_device = \"/dev/sda\"'' | jq \" .devices.sda.disk_id = $RAW_DISK_ID\"
      | grep -v \"\\\"id\\\":\" | jq ''.label = \"Windows\"'' | grep -v \"\\\"created\\\":\"
      | grep -v \"\\\"updated\\\":\"`\n\n  echo \"## New Config\"\n  echo \"$NEW_CONFIG\"
      | jq\n\n  if ! [ $WINDOWS_CONFIG_ID -gt 0 ]; then\n    echo \"## Windows config
      doesn''t exist, creating.\"\n    curl -sH \"Content-Type: application/json\"
      \\\n        -H \"Authorization: Bearer $TOKEN\" \\\n        -X POST -d \"$NEW_CONFIG\"\\\n        https://api.linode.com/v4/linode/instances/$LINODE_ID/configs
      | jq\n  else\n    echo \"## Windows config exists, updating.\"\n    curl -sH
      \"Content-Type: application/json\" \\\n        -H \"Authorization: Bearer $TOKEN\"
      \\\n        -X PUT -d \"$NEW_CONFIG\"\\\n        https://api.linode.com/v4/linode/instances/$LINODE_ID/configs/$WINDOWS_CONFIG_ID
      | jq\n fi\n\n  WINDOWS_CONFIG_ID=`curl -sH \"Authorization: Bearer $TOKEN\"
      \\\n      https://api.linode.com/v4/linode/instances/$LINODE_ID/configs | jq
      ''.data[] | select (.label == \"Windows\") | .id''`\n  echo \"## Windows Config:
      $WINDOWS_CONFIG_ID\"\n\n  if ! [ -f /usr/bin/wimmount ]; then\n    export DEBIAN_FRONTEND=noninteractive\n    apt
      update\n    apt install -yq wimtools genisoimage libwin-hivex-perl\n  fi\n\n  if
      ! [ -f /snap/bin/distrobuilder ]; then\n    snap install distrobuilder --classic\n  fi\n\n  if
      ! [ -f woeusb.sh ]; then\n    wget -O woeusb.sh https://github.com/WoeUSB/WoeUSB/releases/download/v5.2.4/woeusb-5.2.4.bash\n    chmod
      +x woeusb.sh\n  fi\n  if ! [ -f windows-amd64.iso ]; then\n    if [ $INSTALL_WINDOWS_VERSION
      == \"2k22\" ]; then\n      wget -q -O windows-amd64.iso $W2K22_ISO_URL\n    fi\n    if
      [ $INSTALL_WINDOWS_VERSION == \"w11\" ]; then\n      wget -q -O windows-amd64.iso
      $W11_ISO_URL\n    fi\n  fi\n  if ! [ -f windows-amd64.iso ]; then\n    echo
      \"Error: No valid ISO found.\"\n    exit\n  fi\n\n  if ! [ -f windows_virtio.iso
      ]; then\n    distrobuilder repack-windows windows-amd64.iso windows_virtio.iso
      --windows-version=$INSTALL_WINDOWS_VERSION\n  fi\n  if ! [ -f windows_virtio.iso
      ]; then\n    echo \"Error: No valid VirtIO ISO found.\"\n    exit\n  fi\n\n  if
      ! [ -a /dev/sdb1 ]; then\n    fdisk /dev/sdb < /root/fdisk.txt\n  fi\n  mkfs.fat
      /dev/sdb1\n  ./woeusb.sh --partition windows_virtio.iso /dev/sdb1\n  mount /dev/sdb1
