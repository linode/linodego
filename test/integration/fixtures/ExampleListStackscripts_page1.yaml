      "", "script": "#!/usr/bin/env bash\n\n# StackScript Chrome Installer Library\n\n#
      We need some common stuff\nif [ -z ${dist+x} ]\nthen\n  source <ssinclude StackScriptID=\"1\">\nfi\n\nfunction
      install_chrome {\n  local base_url=\"https://dl.google.com/linux/direct/\"\n  printf
      \"Either agree with both https://www.google.com/intl/ja/chrome/terms/ and https://policies.google.com/terms,
      \\n\"\n  printf \"or abort immidiately!\\n\"\n\n  # Determine which package
      manager to use, and install the specified package\n  case \"${detected_distro[''family'']}\"
      in\n    ''debian'')\n      wget \"${base_url}/google-chrome-stable_current_amd64.deb\"\n      DEBIAN_FRONTEND=noninteractive
      apt-get -y install \"./google-chrome-stable_current_amd64.deb\" -qq >/dev/null
      || {\n        printf \"One of the packages could not be installed via apt-get\\n\"\n        printf
      \"Check out /var/log/stackscript.log for more details\\n\"\n        return 1;\n      }\n      rm
      -f ./google-chrome-stable_current_amd64.deb\n      ;;\n    ''redhat'')\n      dnf
      --quiet -y localinstall \"./google-chrome-stable_current_x86_64.rpm\" >/dev/null
      || {\n        printf \"One of the packages could not be installed via yum\\n\"\n        printf
      \"Check out /var/log/stackscript.log for more details\\n\"\n        return 1;\n     }\n     rm
      -f ./google-chrome-stable_current_x86_64.rpm\n     ;;\n  esac\n}", "user_defined_fields":
