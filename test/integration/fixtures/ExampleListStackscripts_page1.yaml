      bionic/mongodb-org/4.2 multiverse\" | sudo tee /etc/apt/sources.list.d/mongodb-org-4.2.list\n    elif
      [ $MONGOVERSION == \"4.0\" ]; then\n        wget -qO - https://www.mongodb.org/static/pgp/server-4.0.asc
      | sudo apt-key add -\n        echo \"deb [ arch=amd64,arm64 ] https://repo.mongodb.org/apt/ubuntu
      bionic/mongodb-org/4.0 multiverse\" | sudo tee /etc/apt/sources.list.d/mongodb-org-4.0.list\n    fi\n\n    apt-get
      update -y\n    apt-get install -y mongodb-org\n    systemctl enable mongod.service\n    systemctl
      start mongod.service\n}\n\nfunction createmongouser {\n    echo \"Creating Mongo
      User\" & sleep 3\n    mongo <<EOF\nuse admin\ndb.createUser({user: \"admin\",
      pwd: \"${DB_PASSWORD}\", roles:[{role: \"userAdminAnyDatabase\", db: \"admin\"}]})\nEOF\n}\nfunction
      setauth {\n    cat <<EOF > /etc/mongod.conf\n# mongod.conf\n# for documentation
      of all options, see:\n#   http://docs.mongodb.org/manual/reference/configuration-options/\n#
      Where and how to store data.\nstorage:\n  dbPath: /var/lib/mongodb\n  journal:\n    enabled:
      true\n#  engine:\n#  wiredTiger:\n# where to write logging data.\nsystemLog:\n  destination:
      file\n  logAppend: true\n  path: /var/log/mongodb/mongod.log\n# network interfaces\nnet:\n  port:
