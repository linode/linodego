      "updated": "2018-01-02T03:04:05", "rev_note": "", "script": "#!/bin/bash\n#\n#
      Script to install NirvaShare applications on Linode\n# Installs docker, docker-compose,
      postgres db, nirvashare admin and user share app\n#\n#\n# <UDF name=\"dbpassword\"
      Label=\"Database Password\" />\n\n## Enable logging\nexec > >(tee /dev/ttyS0
      /var/log/stackscript.log) 2>&1\n\n# Source the Linode Bash StackScript, API,
      and OCA Helper libraries\nsource <ssinclude StackScriptID=1>\nsource <ssinclude
      StackScriptID=632759>\nsource <ssinclude StackScriptID=401712>\n\n# Source and
      run the New Linode Setup script for DNS/SSH configuration\nsource <ssinclude
      StackScriptID=666912>\n\n## Linode Docker OCA\nsource <ssinclude StackScriptID=607433>\n\n#
      Configure service file\ncat <<END > /etc/systemd/system/nirvashare.service\n[Unit]\nDescription=Docker
      Compose NirvaShare Application Service\nRequires=nirvashare.service\nAfter=nirvashare.service\n[Service]\nType=oneshot\nRemainAfterExit=yes\nExecStart=/usr/local/bin/docker-compose
      up -d\nExecStop=/usr/local/bin/docker-compose down\nExecReload=/usr/local/bin/docker-compose
      up -d\nWorkingDirectory=/var/nirvashare/\n[Install]\nWantedBy=multi-user.target\nEND\n\n#
      Get Docker Composer file\nmkdir -p /var/nirvashare\ncd /var/nirvashare\necho
      \"version: ''3''\nservices:\n  admin:\n    image: nirvato/nirvashare-admin:latest\n    container_name:
      nirvashare_admin\n    networks:\n      - nirvashare\n    restart: always\n    ports:\n#      #
      Public HTTP Port:\n      - 8080:8080\n    environment:\n      ns_db_jdbc_url:
      ''jdbc:postgresql://nirvashare_database:5432/postgres''\n      ns_db_username:
      ''nirvashare''\n      ns_db_password: ''$DBPASSWORD''\n    volumes:\n      -
      /var/nirvashare:/var/nirvashare     \n    depends_on:\n      - db\n  userapp:\n    image:
      nirvato/nirvashare-userapp:latest\n    container_name: nirvashare_userapp\n    networks:\n      -
      nirvashare\n    restart: always\n    ports:\n#      # Public HTTP Port:\n      -
      8081:8080\n    environment:\n      ns_db_jdbc_url: ''jdbc:postgresql://nirvashare_database:5432/postgres''\n      ns_db_username:
      ''nirvashare''\n      ns_db_password: ''$DBPASSWORD''\n    volumes:\n      -
      /var/nirvashare:/var/nirvashare      \n    depends_on:\n      - admin\n  db:\n   image:
      postgres:13.2\n   networks:\n      - nirvashare\n   container_name: nirvashare_database\n   restart:
      always\n#   ports:\n#        - 5432:5432\n   environment: \n     POSTGRES_PASSWORD:
      ''$DBPASSWORD''\n     POSTGRES_USER: ''nirvashare''\n   volumes:\n      - db_data:/var/lib/postgresql/data\nvolumes:\n   db_data:\nnetworks:\n  nirvashare:
      {}\n\"  > /var/nirvashare/docker-compose.yml\n\n# Enable Nirvashare daemon\nsystemctl
