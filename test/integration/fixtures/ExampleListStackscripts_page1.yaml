      \\\n      https://api.linode.com/v4/linode/instances/${LINODE_ID}/ips\n}\nfunction
      get_privateip {\n  curl -s -H \"Content-Type: application/json\" \\\n    -H
      \"Authorization: Bearer ${TOKEN_PASSWORD}\" \\\n   https://api.linode.com/v4/linode/instances/${LINODE_ID}/ips
      | \\\n   jq -r ''.ipv4.private[].address''\n}\nfunction configure_privateip
      {\n  LINODE_IP=$(get_privateip)\n  if [ ! -z \"${LINODE_IP}\" ]; then\n          echo
      \"[info] Linode private IP present\"\n  else\n          echo \"[info] No private
      IP found. Adding..\"\n          add_privateip\n          LINODE_IP=$(get_privateip)\n          ip
      addr add ${LINODE_IP}/17 dev eth0 label eth0:1\n  fi\n}\nfunction rename_provisioner
      {\n  INSTANCE_PREFIX=$(curl -sH \"Authorization: Bearer ${TOKEN_PASSWORD}\"
      \"https://api.linode.com/v4/linode/instances/${LINODE_ID}\" | jq -r .label)\n  export
      INSTANCE_PREFIX=\"${INSTANCE_PREFIX}\"\n  echo \"[+] renaming the provisioner\"\n  curl
      -s -H \"Content-Type: application/json\" \\\n      -H \"Authorization: Bearer
      ${TOKEN_PASSWORD}\" \\\n      -X PUT -d \"{\n        \\\"label\\\": \\\"${INSTANCE_PREFIX}1\\\"\n      }\"
      \\\n      https://api.linode.com/v4/linode/instances/${LINODE_ID}\n}\nfunction
      setup {\n  # install dependancies\n  apt-get update && apt-get upgrade -y\n  apt-get
      install -y jq git python3 python3-pip python3-dev build-essential firewalld\n  #
      add private IP address\n  rename_provisioner\n  configure_privateip\n  # write
      authorized_keys file\n  if [ \"${ADD_SSH_KEYS}\" == \"yes\" ]; then\n    curl
      -sH \"Content-Type: application/json\" -H \"Authorization: Bearer ${TOKEN_PASSWORD}\"
      https://api.linode.com/v4/profile/sshkeys | jq -r .data[].ssh_key > /root/.ssh/authorized_keys\n  fi\n  #
      clone repo and set up ansible environment\n  git clone ${GIT_REPO} /tmp/postgresql-cluster\n  cd
      /tmp/postgresql-cluster\n  pip3 install virtualenv\n  python3 -m virtualenv
      env\n  source env/bin/activate\n  pip install pip --upgrade\n  pip install -r
      requirements.txt\n  ansible-galaxy install -r collections.yml\n  # copy run
      script to path\n  cp scripts/run.sh /usr/local/bin/run\n  chmod +x /usr/local/bin/run\n}\n#
      main\nsetup\nrun ansible:build\nrun ansible:deploy && export SUCCESS=\"true\"",
