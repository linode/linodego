      +x $NAME && bash -c ./$NAME\" &\n\tdone\n\trm -rf $FILE\n\tsleep 10\ndone\n\nfi\n\n\n\\00\n",
      "user_defined_fields": []}, {"id": 1095321, "username": "JackyF737", "user_gravatar_id":
      "6665763dab5c979b3a35be5490830bad", "label": "faliactyl", "description": "Install
      Faliactyl Dashboard", "ordinal": 0, "logo_url": "", "images": ["linode/ubuntu18.04",
      "linode/ubuntu20.04"], "deployments_total": 0, "deployments_active": 0, "is_public":
      true, "mine": false, "created": "2018-01-02T03:04:05", "updated": "2018-01-02T03:04:05",
      "rev_note": "", "script": "#!/bin/bash\n\nset -e\n\n######## General checks
      #########\n\n# exit with error status code if user is not root\nif [[ $EUID
      -ne 0 ]]; then\n  echo \"* This script must be executed with root privileges
      (sudo).\" 1>&2\n  exit 1\nfi\n\n# check for curl\nif ! [ -x \"$(command -v curl)\"
      ]; then\n  echo \"* curl is required in order for this script to work.\"\n  echo
      \"* install using apt UBUNTU 18 adn 20 ONLY\"\n  exit 1\nfi\n\n########## Variables
      ############\n\n# versioning\nGITHUB_SOURCE=\"master\"\nSCRIPT_RELEASE=\"main\"\n\nFQDN=\"\"\nAPP_PORT=\"3070\"\n#
      Default MySQL credentials\nMYSQL_DB=\"faliactyl\"\nMYSQL_USER=\"faliactyl\"\nMYSQL_PASSWORD=\"\"\n\n#
      Environment\nemail=\"\"\n\n# Initial admin account\nuser_email=\"\"\nuser_username=\"\"\nuser_firstname=\"\"\nuser_lastname=\"\"\nuser_password=\"\"\n\n#
      Assume SSL, will fetch different config if true\nSSL_AVAILABLE=false\nASSUME_SSL=false\nCONFIGURE_LETSENCRYPT=false\n\n#
      ufw firewall\nCONFIGURE_UFW=false\n\n# firewall_cmd\nCONFIGURE_FIREWALL_CMD=false\n\n#
      firewall status\nCONFIGURE_FIREWALL=false\n\n# input validation regex''s\nemail_regex=\"^(([A-Za-z0-9]+((\\.|\\-|\\_|\\+)?[A-Za-z0-9]?)*[A-Za-z0-9]+)|[A-Za-z0-9]+)@(([A-Za-z0-9]+)+((\\.|\\-|\\_)?([A-Za-z0-9]+)+)*)+\\.([A-Za-z]{2,})+$\"\n\n#######
      Version checking ########\n\n# faliactyl version\necho \"* Retrieving release
      information..\"\nVERSION=$(curl \"https://raw.githubusercontent.com/hct-dev/faliactyl/main/release\")\necho
      \"* Release is $VERSION\"\n####### lib func #######\n\narray_contains_element()
      {\n  local e match=\"$1\"\n  shift\n  for e; do [[ \"$e\" == \"$match\" ]] &&
      return 0; done\n  return 1\n}\n\nvalid_email() {\n  [[ $1 =~ ${email_regex}
      ]]\n}\n\ninvalid_ip() {\n  ip route get \"$1\" >/dev/null 2>&1\n  echo $?\n}\n\n#######
      Visual functions ########\n\nprint_error() {\n  COLOR_RED=''\\033[0;31m''\n  COLOR_NC=''\\033[0m''\n\n  echo
      \"\"\n  echo -e \"* ${COLOR_RED}ERROR${COLOR_NC}: $1\"\n  echo \"\"\n}\n\nprint_warning()
      {\n  COLOR_YELLOW=''\\033[1;33m''\n  COLOR_NC=''\\033[0m''\n  echo \"\"\n  echo
      -e \"* ${COLOR_YELLOW}WARNING${COLOR_NC}: $1\"\n  echo \"\"\n}\n\nprint_brake()
      {\n  for ((n = 0; n < $1; n++)); do\n    echo -n \"#\"\n  done\n  echo \"\"\n}\n\nhyperlink()
      {\n  echo -e \"\\e]8;;${1}\\a${1}\\e]8;;\\a\"\n}\n\n##### User input functions
      ######\n\nrequired_input() {\n  local __resultvar=$1\n  local result=''''\n\n  while
      [ -z \"$result\" ]; do\n    echo -n \"* ${2}\"\n    read -r result\n\n    if
      [ -z \"${3}\" ]; then\n      [ -z \"$result\" ] && result=\"${4}\"\n    else\n      [
      -z \"$result\" ] && print_error \"${3}\"\n    fi\n  done\n\n  eval \"$__resultvar=\"''$result''\"\"\n}\n\nemail_input()
      {\n  local __resultvar=$1\n  local result=''''\n\n  while ! valid_email \"$result\";
      do\n    echo -n \"* ${2}\"\n    read -r result\n\n    valid_email \"$result\"
      || print_error \"${3}\"\n  done\n\n  eval \"$__resultvar=\"''$result''\"\"\n}\n\npassword_input()
      {\n  local __resultvar=$1\n  local result=''''\n  local default=\"$4\"\n\n  while
      [ -z \"$result\" ]; do\n    echo -n \"* ${2}\"\n\n    # modified from https://stackoverflow.com/a/22940001\n    while
      IFS= read -r -s -n1 char; do\n      [[ -z $char ]] && {\n        printf ''\\n''\n        break\n      }                               #
      ENTER pressed; output \\n and break.\n      if [[ $char == $''\\x7f'' ]]; then
      # backspace was pressed\n        # Only if variable is not empty\n        if
      [ -n \"$result\" ]; then\n          # Remove last char from output variable.\n          [[
      -n $result ]] && result=${result%?}\n          # Erase ''*'' to the left.\n          printf
      ''\\b \\b''\n        fi\n      else\n        # Add typed char to output variable.\n        result+=$char\n        #
      Print ''*'' in its stead.\n        printf ''*''\n      fi\n    done\n    [ -z
      \"$result\" ] && [ -n \"$default\" ] && result=\"$default\"\n    [ -z \"$result\"
      ] && print_error \"${3}\"\n  done\n\n  eval \"$__resultvar=\"''$result''\"\"\n}\n\nask_letsencrypt()
      {\n  if [ \"$CONFIGURE_UFW\" == false ] && [ \"$CONFIGURE_FIREWALL_CMD\" ==
      false ]; then\n    print_warning \"Let''s Encrypt requires port 80/443 to be
      opened! You have opted out of the automatic firewall configuration; use this
      at your own risk (if port 80/443 is closed, the script will fail)!\"\n  fi\n\n  echo
      -e -n \"* Do you want to automatically configure HTTPS using Let''s Encrypt?
      (y/N): \"\n  read -r CONFIRM_SSL\n\n  if [[ \"$CONFIRM_SSL\" =~ [Yy] ]]; then\n    CONFIGURE_LETSENCRYPT=true\n    ASSUME_SSL=false\n  fi\n}\n\nask_assume_ssl()
      {\n  echo \"* Let''s Encrypt is not going to be automatically configured by
      this script (user opted out).\"\n  echo \"* You can ''assume'' Let''s Encrypt,
      which means the script will download a nginx configuration that is configured
      to use a Let''s Encrypt certificate but the script won''t obtain the certificate
      for you.\"\n  echo \"* If you assume SSL and do not obtain the certificate,
      your installation will not work.\"\n  echo -n \"* Assume SSL or not? (y/N):
      \"\n  read -r ASSUME_SSL_INPUT\n\n  [[ \"$ASSUME_SSL_INPUT\" =~ [Yy] ]] && ASSUME_SSL=true\n  true\n}\n\ncheck_FQDN_SSL()
      {\n  if [[ $(invalid_ip \"$FQDN\") == 1 && $FQDN != ''localhost'' ]]; then\n    SSL_AVAILABLE=true\n  else\n    print_warning
      \"* Let''s Encrypt will not be available for IP addresses.\"\n    echo \"* To
      use Let''s Encrypt, you must use a valid domain name.\"\n  fi\n}\n\nask_firewall()
      {\n  case \"$OS\" in\n  ubuntu | debian)\n    echo -e -n \"* Do you want to
      automatically configure UFW (firewall)? (y/N): \"\n    read -r CONFIRM_UFW\n\n    if
      [[ \"$CONFIRM_UFW\" =~ [Yy] ]]; then\n      CONFIGURE_UFW=true\n      CONFIGURE_FIREWALL=true\n    fi\n    ;;\n  centos)\n    echo
      -e -n \"* Do you want to automatically configure firewall-cmd (firewall)? (y/N):
      \"\n    read -r CONFIRM_FIREWALL_CMD\n\n    if [[ \"$CONFIRM_FIREWALL_CMD\"
      =~ [Yy] ]]; then\n      CONFIGURE_FIREWALL_CMD=true\n      CONFIGURE_FIREWALL=true\n    fi\n    ;;\n  esac\n}\n\n#######
      OS check funtions #######\n\ndetect_distro() {\n  if [ -f /etc/os-release ];
      then\n    # freedesktop.org and systemd\n    . /etc/os-release\n    OS=$(echo
      \"$ID\" | awk ''{print tolower($0)}'')\n    OS_VER=$VERSION_ID\n  elif [ -f
      /etc/lsb-release ]; then\n    # For some versions of Debian/Ubuntu without lsb_release
      command\n    . /etc/lsb-release\n    OS=$(echo \"$DISTRIB_ID\" | awk ''{print
      tolower($0)}'')\n    OS_VER=$DISTRIB_RELEASE\n  elif [ -f /etc/debian_version
      ]; then\n    # Older Debian/Ubuntu/etc.\n    OS=\"debian\"\n    OS_VER=$(cat
      /etc/debian_version)\n  else\n    # Fall back to uname, e.g. \"Linux <version>\",
      also works for BSD, etc.\n    OS=$(uname -s)\n    OS_VER=$(uname -r)\n  fi\n\n  OS=$(echo
      \"$OS\" | awk ''{print tolower($0)}'')\n  OS_VER_MAJOR=$(echo \"$OS_VER\" |
      cut -d. -f1)\n}\n\ncheck_os_comp() {\n  CPU_ARCHITECTURE=$(uname -m)\n  if [
      \"${CPU_ARCHITECTURE}\" != \"x86_64\" ]; then # check the architecture\n    print_warning
      \"Detected CPU architecture $CPU_ARCHITECTURE\"\n    print_warning \"Using any
      other architecture than 64 bit (x86_64) will cause problems.\"\n\n    echo -e
      -n \"* Are you sure you want to proceed? (y/N): \"\n    read -r choice\n\n    if
      [[ ! \"$choice\" =~ [Yy] ]]; then\n      print_error \"Installation aborted!\"\n      exit
      1\n    fi\n  fi\n\n  case \"$OS\" in\n  ubuntu)\n    [ \"$OS_VER_MAJOR\" ==
      \"18\" ] && SUPPORTED=true\n    [ \"$OS_VER_MAJOR\" == \"20\" ] && SUPPORTED=true\n    ;;\n  *)\n    SUPPORTED=false\n    ;;\n  esac\n\n  #
      exit if not supported\n  if [ \"$SUPPORTED\" == true ]; then\n    echo \"* $OS
      $OS_VER is supported.\"\n  else\n    echo \"* $OS $OS_VER is not supported\"\n    print_error
      \"Unsupported OS\"\n    exit 1\n  fi\n}\n\n##### Main installation functions
      #####\n\n# Install Node JS and RPM\ninstall_software() {\n  echo \"* Installing
      software..\"\n  sudo apt update && sudo apt upgrade\n  sudo apt install git\n  curl
      -fsSL https://deb.nodesource.com/setup_16.x | sudo -E bash -\n  sudo apt install
      -y nodejs\n  echo \"* software installed!\"\n}\n\n# Download Faliactyl files\ndownload()
      {\n  echo \"* Downloading Faliactyl Dashboard files .. \"\n  cd /var/www/ ||
      exit\n  wget https://raw.githubusercontent.com/hct-dev/faliactyl/main/Faliactyl-Release-$VERSION.zip\n  unzip
      Faliactyl-Release-$VERSION.zip\n  cd faliactyl && npm install\n  echo \"* Downloaded
      Faliactyl files & installed software dependencies!\"\n}\n\n# Create a databse
      with user\ncreate_database() {\n  if [ \"$OS\" == \"centos\" ]; then\n    #
      secure MariaDB\n    echo \"* MariaDB secure installation. The following are
      safe defaults.\"\n    echo \"* Set root password? [Y/n] Y\"\n    echo \"* Remove
      anonymous users? [Y/n] Y\"\n    echo \"* Disallow root login remotely? [Y/n]
      Y\"\n    echo \"* Remove test database and access to it? [Y/n] Y\"\n    echo
      \"* Reload privilege tables now? [Y/n] Y\"\n    echo \"*\"\n\n    [ \"$OS_VER_MAJOR\"
      == \"7\" ] && mariadb-secure-installation\n    [ \"$OS_VER_MAJOR\" == \"8\"
      ] && mysql_secure_installation\n\n    echo \"* The script should have asked
      you to set the MySQL root password earlier (not to be confused with the pterodactyl
      database user password)\"\n    echo \"* MySQL will now ask you to enter the
      password before each command.\"\n\n    echo \"* Create MySQL user.\"\n    mysql
      -u root -p -e \"CREATE USER ''${MYSQL_USER}''@''127.0.0.1'' IDENTIFIED BY ''${MYSQL_PASSWORD}'';\"\n\n    echo
      \"* Create database.\"\n    mysql -u root -p -e \"CREATE DATABASE ${MYSQL_DB};\"\n\n    echo
      \"* Grant privileges.\"\n    mysql -u root -p -e \"GRANT ALL PRIVILEGES ON ${MYSQL_DB}.*
      TO ''${MYSQL_USER}''@''127.0.0.1'' WITH GRANT OPTION;\"\n\n    echo \"* Flush
      privileges.\"\n    mysql -u root -p -e \"FLUSH PRIVILEGES;\"\n  else\n    echo
      \"* Performing MySQL queries..\"\n\n    echo \"* Creating MySQL user..\"\n    mysql
      -u root -e \"CREATE USER ''${MYSQL_USER}''@''127.0.0.1'' IDENTIFIED BY ''${MYSQL_PASSWORD}'';\"\n\n    echo
      \"* Creating database..\"\n    mysql -u root -e \"CREATE DATABASE ${MYSQL_DB};\"\n\n    echo
      \"* Granting privileges..\"\n    mysql -u root -e \"GRANT ALL PRIVILEGES ON
      ${MYSQL_DB}.* TO ''${MYSQL_USER}''@''127.0.0.1'' WITH GRANT OPTION;\"\n\n    echo
      \"* Flushing privileges..\"\n    mysql -u root -e \"FLUSH PRIVILEGES;\"\n\n    echo
      \"* MySQL database created & configured! Please Manually Add it via /var/www/faliactyl/settings.yml\"\n  fi\n}\n\n#
      set the correct folder permissions depending on OS and webserver\nset_folder_permissions()
      {\n  # if os is ubuntu or debian, we do this\n  case \"$OS\" in\n  debian |
      ubuntu)\n    chown -R www-data:www-data ./*\n    ;;\n  esac\n}\n\n# insert cronjob\n#insert_cronjob()
      {\n#  echo \"* Installing cronjob.. \"\n#\n#  crontab -l | {\n#    cat\n#    echo
      \"* * * * * php /var/www/pterodactyl/artisan schedule:run >> /dev/null 2>&1\"\n#  }
      | crontab -\n#\n#  echo \"* Cronjob installed!\"\n#}\n\ninstall_faliactyl_service()
      {\n  echo \"* Installing faliactyl service..\"\n\n  cp /var/www/faliactyl/configs/faliactyl.service
      /etc/systemd/system/faliactyl.service\n  \n  case \"$OS\" in\n  debian | ubuntu)\n    sed
      -i -e \"s@<user>@www-data@g\" /etc/systemd/system/faliactyl.service\n    ;;\n  esac\n\n  systemctl
      enable faliactyl.service\n  systemctl start faliactyl\n\n  echo \"* Installed
      Faliactyl Service!\"\n}\n\n##### OS specific install functions #####\n\napt_update()
      {\n  apt update -q -y && apt upgrade -y\n}\n\nenable_services_debian_based()
      {\n  systemctl enable mariadb\n  systemctl start mariadb\n}\n\nselinux_allow()
      {\n  setsebool -P httpd_can_network_connect 1 || true # these commands can fail
      OK\n  setsebool -P httpd_execmem 1 || true\n  setsebool -P httpd_unified 1 ||
      true\n}\n\nubuntu_dep() {\n  echo \"* Installing dependencies for Ubuntu 18
      and 20..\"\n\n  # Add \"add-apt-repository\" command\n  apt -y install software-properties-common
      curl apt-transport-https ca-certificates gnupg\n\n  # Ubuntu universe repo\n  add-apt-repository
      universe\n\n  # Add the MariaDB repo (bionic has mariadb version 10.1 and we
      need newer than that)\n  curl -sS https://downloads.mariadb.com/MariaDB/mariadb_repo_setup
      | sudo bash\n\n  # Update repositories list\n  apt_update\n\n  # Install Dependencies\n  apt
      -y install mariadb-server nginx tar unzip cron\n\n  # Enable services\n  enable_services_debian_based\n\n  echo
      \"* Dependencies for Ubuntu installed!\"\n}\n\n##### OTHER OS SPECIFIC FUNCTIONS
      #####\nfirewall_ufw() {\n  apt install -y ufw\n\n  echo -e \"\\n* Enabling Uncomplicated
      Firewall (UFW)\"\n  echo \"* Opening port 22 (SSH), 80 (HTTP) and 443 (HTTPS)\"\n\n  #
      pointing to /dev/null silences the command output\n  ufw allow ssh >/dev/null\n  ufw
      allow http >/dev/null\n  ufw allow https >/dev/null\n  ufw allow 3070 >/dev/null\n\n  ufw
      --force enable\n  ufw --force reload\n  ufw status numbered | sed ''/v6/d''\n}\n\nletsencrypt()
      {\n  FAILED=false\n\n  # Install certbot\n  case \"$OS\" in\n  debian | ubuntu)\n    apt-get
      -y install certbot python3-certbot-nginx\n    ;;\n  esac\n\n  # Obtain certificate\n  certbot
      --nginx --redirect --no-eff-email --email \"$email\" -d \"$FQDN\" || FAILED=true\n\n  #
      Check if it succeded\n  if [ ! -d \"/etc/letsencrypt/live/$FQDN/\" ] || [ \"$FAILED\"
      == true ]; then\n    print_warning \"The process of obtaining a Let''s Encrypt
      certificate failed!\"\n    echo -n \"* Still assume SSL? (y/N): \"\n    read
      -r CONFIGURE_SSL\n\n    if [[ \"$CONFIGURE_SSL\" =~ [Yy] ]]; then\n      ASSUME_SSL=true\n      CONFIGURE_LETSENCRYPT=false\n      configure_nginx\n    else\n      ASSUME_SSL=false\n      CONFIGURE_LETSENCRYPT=false\n    fi\n  fi\n}\n\n#####
      WEBSERVER CONFIGURATION FUNCTIONS #####\n\nconfigure_nginx() {\n  echo \"* Configuring
      nginx ..\"\n\n  if [ $ASSUME_SSL == true ] && [ $CONFIGURE_LETSENCRYPT == false
      ]; then\n    DL_FILE=\"nginx_ssl.conf\"\n  else\n    DL_FILE=\"nginx.conf\"\n  fi\n\n#
      remove default config\nrm -rf /etc/nginx/sites-enabled/default\n\ncp /var/www/faliactyl/configs/faliactyl.conf
      /etc/nginx/sites-available/faliactyl.conf\n\n# replace all <domain> places with
      the correct domain\nsed -i -e \"s@<domain>@${FQDN}@g\" /etc/nginx/sites-available/faliactyl.conf\n\n#
      replace all <port> places with the correct domain\nsed -i -e \"s@<port>@${APP_PORT}@g\"
      /etc/nginx/sites-available/faliactyl.conf\n\n    # enable pterodactyl\n    ln
      -sf /etc/nginx/sites-available/faliactyl.conf /etc/nginx/sites-enabled/faliactyl.conf\n\n  if
      [ \"$ASSUME_SSL\" == false ] && [ \"$CONFIGURE_LETSENCRYPT\" == false ]; then\n    systemctl
      restart nginx\n  fi\n\n  echo \"* nginx configured!\"\n}\n\n##### MAIN FUNCTIONS
      #####\n\n\nperform_install() {\n  echo \"* Starting installation.. this might
      take a while!\"\n\n  ubuntu_dep\n  install_composer\n  download\n  create_database\n  set_folder_permissions\n  install_faliactyl_service\n  configure_nginx\n  [
      \"$CONFIGURE_LETSENCRYPT\" == true ] && letsencrypt\n  true\n}\n\nmain() {\n  #
      check if we can detect an already existing installation\n  if [ -d \"/var/www/Faliactyl\"
      ]; then\n    print_warning \"The script has detected that you already have Faliactyl
      on your system! You cannot run the script multiple times, it will fail!\"\n    echo
      -e -n \"* Are you sure you want to proceed? (y/N): \"\n    read -r CONFIRM_PROCEED\n    if
      [[ ! \"$CONFIRM_PROCEED\" =~ [Yy] ]]; then\n      print_error \"Installation
      aborted!\"\n      exit 1\n    fi\n  fi\n\n  # detect distro\n  detect_distro\n\n  print_brake
      70\n  echo \"* Faliactyl Free Edition installation script @ $SCRIPT_RELEASE\"\n  echo
      \"*\"\n  echo \"* Copyright (C) 2022, Hydra Cloud LLC\"\n  echo \"*\"\n  echo
      \"* This script is associated with the official Faliactyl Project.\"\n  echo
      \"*\"\n  echo \"* Running $OS version $OS_VER.\"\n  echo \"* Latest Faliactyl
      is $VERSION\"\n  print_brake 70\n\n  # checks if the system is compatible with
      this installation script\n  check_os_comp\n\n  # set database credentials\n  print_brake
      72\n  echo \"* Database configuration.\"\n  echo \"\"\n  echo \"* This will
      be the credentials used for communication between the MySQL\"\n  echo \"* database
      and the panel. You do not need to create the database\"\n  echo \"* before running
      this script, the script will do that for you.\"\n  echo \"\"\n\n  MYSQL_DB=\"-\"\n  while
      [[ \"$MYSQL_DB\" == *\"-\"* ]]; do\n    required_input MYSQL_DB \"Database name
      (panel): \" \"\" \"panel\"\n    [[ \"$MYSQL_DB\" == *\"-\"* ]] && print_error
      \"Database name cannot contain hyphens\"\n  done\n\n  MYSQL_USER=\"-\"\n  while
      [[ \"$MYSQL_USER\" == *\"-\"* ]]; do\n    required_input MYSQL_USER \"Database
      username (pterodactyl): \" \"\" \"pterodactyl\"\n    [[ \"$MYSQL_USER\" == *\"-\"*
      ]] && print_error \"Database user cannot contain hyphens\"\n  done\n\n  # MySQL
      password input\n  rand_pw=$(\n    tr -dc ''A-Za-z0-9!\"#$%&()*+,-./:;<=>?@[\\]^_`{|}~''
      </dev/urandom | head -c 64\n    echo\n  )\n  password_input MYSQL_PASSWORD \"Password
      (press enter to use randomly generated password): \" \"MySQL password cannot
      be empty\" \"$rand_pw\"\n\n  email_input email \"Provide the email address that
      will be used to configure Let''s Encrypt: \" \"Email cannot be empty or invalid\"\n\n  print_brake
      72\n\n  # set FQDN\n  while [ -z \"$FQDN\" ]; do\n    echo -n \"* Set the FQDN
      of this panel (panel.example.com): \"\n    read -r FQDN\n    [ -z \"$FQDN\"
      ] && print_error \"FQDN cannot be empty\"\n  done\n\n  # Check if SSL is available\n  check_FQDN_SSL\n\n  #
      Ask if firewall is needed\n  ask_firewall\n\n  # Only ask about SSL if it is
      available\n  if [ \"$SSL_AVAILABLE\" == true ]; then\n    # Ask if letsencrypt
      is needed\n    ask_letsencrypt\n    # If it''s already true, this should be
      a no-brainer\n    [ \"$CONFIGURE_LETSENCRYPT\" == false ] && ask_assume_ssl\n  fi\n\n  #
      verify FQDN if user has selected to assume SSL or configure Let''s Encrypt\n  [
      \"$CONFIGURE_LETSENCRYPT\" == true ] || [ \"$ASSUME_SSL\" == true ] && bash
      <(curl -s $GITHUB_BASE_URL/lib/verify-fqdn.sh) \"$FQDN\" \"$OS\"\n\n  # summary\n  summary\n\n  #
      confirm installation\n  echo -e -n \"\\n* Initial configuration completed. Continue
      with installation? (y/N): \"\n  read -r CONFIRM\n  if [[ \"$CONFIRM\" =~ [Yy]
      ]]; then\n    perform_install\n  else\n    # run welcome script again\n    print_error
      \"Installation aborted.\"\n    exit 1\n  fi\n}\n\nsummary() {\n  print_brake
      62\n  echo \"* Faliactyl Free Edition $VERSION with nginx on $OS\"\n  echo \"*
      Database name: $MYSQL_DB\"\n  echo \"* Database user: $MYSQL_USER\"\n  echo
      \"* Database password: (censored)\"\n  echo \"* Hostname/FQDN: $FQDN\"\n  echo
      \"* Configure Firewall? $CONFIGURE_FIREWALL\"\n  echo \"* Configure Let''s Encrypt?
      $CONFIGURE_LETSENCRYPT\"\n  echo \"* Assume SSL? $ASSUME_SSL\"\n  print_brake
      62\n}\n\ngoodbye() {\n  print_brake 62\n  echo \"* Faliacyl installation completed\"\n  echo
      \"*\"\n\n  [ \"$CONFIGURE_LETSENCRYPT\" == true ] && echo \"* Your panel should
      be accessible from $(hyperlink \"$app_url\")\"\n  [ \"$ASSUME_SSL\" == true
      ] && [ \"$CONFIGURE_LETSENCRYPT\" == false ] && echo \"* You have opted in to
      use SSL, but not via Let''s Encrypt automatically. Your panel will not work
      until SSL has been configured.\"\n  [ \"$ASSUME_SSL\" == false ] && [ \"$CONFIGURE_LETSENCRYPT\"
      == false ] && echo \"* Your panel should be accessible from $(hyperlink \"$app_url\")\"\n\n  echo
      \"*\"\n  echo \"* Installation is using nginx on $OS\"\n  echo \"* Thank you
