      "updated": "2018-01-02T03:04:05", "rev_note": "", "script": "#!/bin/bash\nexec
      >/var/log/stackscript.log 2>&1\n# Install Docker\napt-get update -y\napt-get
      install -y ca-certificates  curl gnupg  lsb-release\nmkdir -p /etc/apt/keyrings\ncurl
      -fsSL https://download.docker.com/linux/ubuntu/gpg | sudo gpg --dearmor -o /etc/apt/keyrings/docker.gpg\necho
      \"deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg]
      https://download.docker.com/linux/ubuntu  $(lsb_release -cs) stable\" | sudo
      tee /etc/apt/sources.list.d/docker.list > /dev/null\napt-get update -y\nchmod
      a+r /etc/apt/keyrings/docker.gpg\napt-get update -y\napt-get install -y docker-ce
      docker-ce-cli containerd.io docker-compose-plugin\n\n# Install microk8s\napt-get
      install snapd -y \nsudo snap install core\nexport PATH=$PATH:/snap/bin\nsnap
      install microk8s --classic --channel=1.25\nsnap refresh microk8s --channel=1.25\nmicrok8s
      status --wait-ready\n\n\n# Install gopaddle\nmicrok8s addons repo add gp-lite
      https://github.com/gopaddle-io/microk8s-community-addons-gplite.git\nmicrok8s
      enable gopaddle-lite\n\necho Waiting for gopaddle services to move to running
      state ...\nmicrok8s.kubectl wait --for=condition=ready pod -l released-by=gopaddle
      -n gp-lite --timeout=15m\n\nRDNS=$(dnsdomainname -A | awk ''{print $1}'')\n\necho
      gopaddle-lite installation is complete ! You can now access the gopaddle dashboard
      @ http://$RDNS:30003/", "user_defined_fields": []}, {"id": 1193788, "username":
