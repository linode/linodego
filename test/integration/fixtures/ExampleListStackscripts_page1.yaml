      enable logging\nexec > >(tee /dev/ttyS0 /var/log/stackscript.log) 2>&1\n# source
      script libraries\nsource <ssinclude StackScriptID=1>\nfunction cleanup {\n  if
      [ \"$?\" != \"0\" ] || [ \"$SUCCESS\" == \"true\" ]; then\n    #deactivate\n    cd
      ${HOME}\n    if [ -d \"/tmp/postgresql-cluster\" ]; then\n      rm -rf /tmp/postgresql-cluster\n    fi\n    if
      [ -d \"/usr/local/bin/run\" ]; then\n      rm /usr/local/bin/run\n    fi\n    stackscript_cleanup\n  fi\n}\nfunction
