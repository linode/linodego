      -x\nyumcount=1\nwhile [ $yumcount -le 20 ]\ndo\n    echo \"*** stackscript -
      yum install try $yumcount ***\"\n    command -v wget >/dev/null 2>&1 || yum
      install -y wget\n    if [ $? -eq 0 ]; then\n        break\n    fi\n    yumcount=$((
      $yumcount + 1 ))\n    sleep 2\ndone\ncommand -v dos2unix >/dev/null 2>&1 ||
      yum install -y dos2unix || exit 1\ncd ${HOME}\nSCRIPT=$(basename $SCRIPT_URL)\nrm
      -f ${SCRIPT}\necho \"Copying ${SCRIPT_URL} to ${HOME}\"\nwget --tries=5 ${SCRIPT_URL}
