      /v TaskbarMn  /t REG_DWORD /d 0 /f &amp;&amp; reg unload HKLM\\DEFAULT &amp;&amp;
      exit</Path>\n                    <Order>4</Order>\n                    <Description>Hide
      Chat</Description>\n                </RunSynchronousCommand>\n                <RunSynchronousCommand
      wcm:action=\"add\">\n                    <Order>3</Order>\n                    <Path>cmd
      /c reg load HKLM\\DEFAULT c:\\users\\default\\ntuser.dat &amp;&amp; reg add
      HKLM\\DEFAULT\\Software\\Microsoft\\Windows\\CurrentVersion\\Explorer\\Advanced
      /v TaskbarDa  /t REG_DWORD /d 0 /f &amp;&amp; reg unload HKLM\\DEFAULT &amp;&amp;
      exit</Path>\n                    <Description>Hide Widget</Description>\n                </RunSynchronousCommand>\n            </RunSynchronous>\n        </component>\n    </settings>\n</unattend>\nEOF\n  fi\n}\n\nif
      [ $INSTALL_WINDOWS_VERSION == \"2k22\" ]; then\n  echo \"Installing Windows
      Server\"\nfi\n\nif [ $INSTALL_WINDOWS_VERSION == \"w11\" ]; then\n  echo \"Installing
      Windows 11\"\nfi\n\nif [ $STAGE == 1 ]; then\n  createunattend\n  stage1\nfi\nif
      [ $STAGE == 2 ]; then\n  stage2\nfi\nif [ $STAGE == 3 ]; then\n  createunattend\n  stage3\nfi",
