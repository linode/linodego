      /usr/share/zoneinfo\nsecurity:\n  authorization: enabled\n#operationProfiling:\n#replication:\n#sharding:\n##
      Enterprise-Only Options:\n#auditLog:\n#snmp:\nEOF\n    service mongod restart\n}\n\nfunction
      main {\n    mongoinstall\n    createmongouser \n    setauth\n}\n\nmain\nstackscript_cleanup",
