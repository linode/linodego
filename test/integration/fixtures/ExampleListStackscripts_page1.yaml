      xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\">\n            <FirewallGroups>\n                <FirewallGroup
      wcm:action=\"add\" wcm:keyValue=\"RemoteDesktop\">\n                    <Active>true</Active>\n                    <Group>Remote
      Desktop</Group>\n                    <Profile>all</Profile>\n                </FirewallGroup>\n            </FirewallGroups>\n        </component>\n        <component
