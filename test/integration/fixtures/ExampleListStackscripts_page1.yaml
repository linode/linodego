      addr show eth0 | grep -oP ''inet \\K[\\d.]+'')\n\n\nsudo apt-get update\nsudo
      apt-get install -y unzip tree redis-tools jq curl tmux\nsudo apt-get clean\n\n\n#
      Disable the firewall\n\nsudo ufw disable || echo \"ufw not installed\"\n\n#
      Download and install Nomad\ncurl -L $NOMADDOWNLOAD > nomad.zip\n\nsudo unzip
      nomad.zip -d /usr/local/bin\nsudo chmod 0755 /usr/local/bin/nomad\nsudo chown
      root:root /usr/local/bin/nomad\n\nsudo mkdir -p $NOMADCONFIGDIR\nsudo chmod
      755 $NOMADCONFIGDIR\nsudo mkdir -p $NOMADDIR\nsudo chmod 755 $NOMADDIR\n\n#
      Docker\ndistro=$(lsb_release -si | tr ''[:upper:]'' ''[:lower:]'')\nsudo apt-get
      install -y apt-transport-https ca-certificates gnupg2 \ncurl -fsSL https://download.docker.com/linux/debian/gpg
      | sudo apt-key add -\nsudo add-apt-repository \"deb [arch=amd64] https://download.docker.com/linux/${distro}
      $(lsb_release -cs) stable\"\nsudo apt-get update\nsudo apt-get install -y docker-ce\n\n#
      Java\nsudo add-apt-repository -y ppa:openjdk-r/ppa\nsudo apt-get update \nsudo
      apt-get install -y openjdk-8-jdk\nJAVA_HOME=$(readlink -f /usr/bin/java | sed
      \"s:bin/jav1234::5678\")\n\n# Install phase finish ---------------------------------------\n\necho
      \"Install complete\"\n\n# Server setup phase begin -----------------------------------\nSERVER_COUNT=${server_count}\nRETRY_JOIN=\"${retry_join}\"\n\nsed
      -i \"s/SERVER_COUNT/$SERVER_COUNT/g\" $CONFIGDIR/nomad.hcl\nsed -i \"s/RETRY_JOIN/$RETRY_JOIN/g\"
      $CONFIGDIR/nomad.hcl\nsed -i \"s/IP_ADDRESS/$IP_ADDRESS/g\" $CONFIGDIR/nomad.hcl\nsudo
      cp $CONFIGDIR/nomad.hcl $NOMADCONFIGDIR\nsudo cp $CONFIGDIR/nomad.service /etc/systemd/system/nomad.service\n\nsudo
      systemctl enable nomad.service\nsudo systemctl start nomad.service\n\n# Wait
      for Nomad to restart\nfor i in {1..9}; do\n    # capture stdout and stderr\n    set
      +e\n    sleep 1\n    OUTPUT=$(nomad -v 2>&1)\n    if [ $? -ne 0 ]; then\n        continue\n    else\n        exit
      0\n    fi\ndone\n\nexport NOMAD_ADDR=http://$IP_ADDRESS:4646\n\n# Add hostname
      to /etc/hosts\n\necho \"127.0.0.1 $(hostname)\" | sudo tee --append /etc/hosts\n\n#
      Add Docker bridge network IP to /etc/resolv.conf (at the top)\n\necho \"nameserver
      $DOCKER_BRIDGE_IP_ADDRESS\" | sudo tee /etc/resolv.conf.new\ncat /etc/resolv.conf
      | sudo tee --append /etc/resolv.conf.new\nsudo mv /etc/resolv.conf.new /etc/resolv.conf\n\n#
      Set env vars\necho \"export NOMAD_ADDR=http://$IP_ADDRESS:4646\" | sudo tee
      --append /home/$HOME_DIR/.bashrc\necho \"export JAVA_HOME=/usr/lib/jvm/java-8-openjdk-amd64/jre\"  |
      sudo tee --append /home/$HOME_DIR/.bashrc\n\n# Server setup phase finish -----------------------------------",
