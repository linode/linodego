      "6c0262d5482846284b510b579df19fdd", "label": "HashiCorp Nomad One-Click", "description":
      "HashiCorp Nomad One Click App", "ordinal": 0, "logo_url": "", "images": ["linode/debian11",
      "linode/ubuntu22.04"], "deployments_total": 0, "deployments_active": 0, "is_public":
      true, "mine": false, "created": "2018-01-02T03:04:05", "updated": "2018-01-02T03:04:05",
      "rev_note": "", "script": "#!/usr/bin/env bash\n\n## Linode/SSH Security Settings\n#<UDF
      name=\"username\" label=\"The limited sudo user to be created for the Linode\"
      default=\"\">\n#<UDF name=\"password\" label=\"The password for the limited
      sudo user\" default=\"\">\n#<UDF name=\"pubkey\" label=\"The SSH Public Key
      that will be used to access the Linode\" default=\"\">\n#<UDF name=\"disable_root\"
      label=\"Disable root access over SSH?\" oneOf=\"Yes,No\" default=\"No\">\n\n##
      Enable logging\nexec > >(tee /dev/ttyS0 /var/log/stackscript.log) 2>&1\n\n##
      Import the Bash StackScript Library\nsource <ssinclude StackScriptID=1>\n\n##
      Import the DNS/API Functions Library\nsource <ssinclude StackScriptID=632759>\n\n##
      Import the OCA Helper Functions\nsource <ssinclude StackScriptID=401712>\n\n##
      Run initial configuration tasks (DNS/SSH stuff, etc...)\nsource <ssinclude StackScriptID=666912>\n\n##
      set some variables\nexport NOMAD_DIR=/usr/bin\nexport NOMAD_PATH=${NOMAD_DIR}/nomad\nexport
      NOMAD_CONFIG_DIR=/etc/nomad.d\nexport NOMAD_DATA_DIR=/opt/nomad/data\nexport
      NOMAD_TLS_DIR=/opt/nomad/tls\nexport NOMAD_ENV_VARS=${NOMAD_CONFIG_DIR}/nomad.conf\nexport
      IP=$(hostname -I | awk ''{print$1}'')\n\n\n## install gpg\napt-get install -y
      gpg\n\n## Install Nomad\nwget -O- https://apt.releases.hashicorp.com/gpg | gpg
      --dearmor | sudo tee /usr/share/keyrings/hashicorp-archive-keyring.gpg\necho
      \"deb [signed-by=/usr/share/keyrings/hashicorp-archive-keyring.gpg] https://apt.releases.hashicorp.com
      $(lsb_release -cs) main\" | sudo tee /etc/apt/sources.list.d/hashicorp.list\nsudo
      apt update -y && sudo apt install -y nomad\n\n#echo \"Start Nomad in -server
      mode\"\nsudo tee ${NOMAD_ENV_VARS} > /dev/null <<ENVVARS\nFLAGS=-bind 0.0.0.0
      -server\nENVVARS\n\n## Create systemd unit file\ncat << EOF > ${NOMAD_ENV_VARS}\n[Unit]\nDescription=Nomad
      Agent\nWants=network-online.target\nAfter=network-online.target\n\n[Service]\nRestart=on-failure\nEnvironmentFile=/etc/nomad.d/nomad.conf\nExecStart=/usr/local/bin/nomad
      agent -config /etc/nomad.d $FLAGS\nExecReload=/bin/kill -HUP $MAINPID\nKillSignal=SIGTERM\nUser=root\nGroup=root\n\n[Install]\nWantedBy=multi-user.target\nEOF\n\n##
      enable and start nomad\nsystemctl enable nomad\nsystemctl start nomad\n\n##
      Install Docker\ncurl -fsSL get.docker.com | sudo sh\n\n## Configure nginx container\ncat
      << EOF > /root/nginx.conf\nevents {}\n\nhttp {\n  server {\n    location / {\n      proxy_pass
      http://nomad-ws;\n      proxy_set_header X-Forwarded-For \\$proxy_add_x_forwarded_for;\n\n      #
      Nomad blocking queries will remain open for a default of 5 minutes.\n      #
      Increase the proxy timeout to accommodate this timeout with an\n      # additional
      grace period.\n      proxy_read_timeout 310s;\n\n      # Nomad log streaming
      uses streaming HTTP requests. In order to\n      # synchronously stream logs
      from Nomad to NGINX to the browser\n      # proxy buffering needs to be turned
      off.\n      proxy_buffering off;\n\n      # The Upgrade and Connection headers
      are used to establish\n      # a WebSockets connection.\n      proxy_set_header
      Upgrade \\$http_upgrade;\n      proxy_set_header Connection \"upgrade\";\n\n      #
      The default Origin header will be the proxy address, which\n      # will be
      rejected by Nomad. It must be rewritten to be the\n      # host address instead.\n      proxy_set_header
      Origin \"\\${scheme}://\\${proxy_host}\";\n    }\n  }\n\n  # Since WebSockets
      are stateful connections but Nomad has multiple\n  # server nodes, an upstream
      with ip_hash declared is required to ensure\n  # that connections are always
      proxied to the same server node when possible.\n  upstream nomad-ws {\n    ip_hash;\n    server
      host.docker.internal:4646;\n  }\n}\nEOF\n\n## start docker container\ndocker
      run -d --publish=8080:80 --add-host=host.docker.internal:host-gateway \\\n    --mount
      type=bind,source=$PWD/nginx.conf,target=/etc/nginx/nginx.conf \\\n    nginx:latest\n\n##
      firewall\nufw allow 22\nufw allow 80\nufw allow 443\nufw allow 4646\nufw allow
      8080\n\ncat << EOF > /etc/motd\n#################################\n The Nomad
      GUI is now available at HTTP://${IP}:8080\n\n This is a minimal installation
      with limited configurations.\n Please review configurations before using this
      application in production.\n\n Information on Nomad configurations at https://www.nomadproject.io/docs/configuration\n#################################\nEOF\n\nstackscript_cleanup",
