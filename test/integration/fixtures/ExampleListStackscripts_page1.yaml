      From https://www.microsoft.com/en-us/software-download/windows11", "default":
      "NOURL"}]}, {"id": 163794, "username": "imanelis", "user_gravatar_id": "2cba72f6568c2e803fc0f79a82b83f2b",
      "label": "windows2", "description": "", "ordinal": 0, "logo_url": "", "images":
      ["linode/ubuntu22.04"], "deployments_total": 4, "deployments_active": 0, "is_public":
      true, "mine": false, "created": "2018-01-02T03:04:05", "updated": "2018-01-02T03:04:05",
      "rev_note": "", "script": "#!/bin/bash\n#\n# Bootstrap installs Windows ISO
      to a Linode from a temporary block storage volume.\n# Based on kitknox/winode,
      patched for better reliability on Akamai Cloud / Linode.\n#\n# Main fixes in
      this version:\n# - Fix broken Windows 11 unattend XML header\n# - Use Windows
      11 image name instead of Windows 10 Pro in unattend\n# - Add stricter shell
      options and safer guards\n# - Add required base packages earlier\n# - Make mkdir/id
      checks idempotent\n# - Make config/disk polling safer when API returns empty
      values\n# - Prefer Ubuntu/Debian source config more defensively\n#\n# IMPORTANT:\n#
      - Create the StackScript with an Ubuntu 22.04 image target\n# - When deploying,
      still choose Ubuntu/Debian in the Linode UI first\n# - Then let this script
      replace the Linux disk with Windows\n#\n#<UDF name=\"TOKEN\" Label=\"Linode
      API Token\" />\n#<UDF name=\"WINDOWS_PASSWORD\" Label=\"Administrator Password
      for Windows\" example=\"Password\" />\n#<UDF name=\"INSTALL_WINDOWS_VERSION\"
      Label=\"Windows Version\" oneOf=\"w11,2k22\" default=\"w11\"/>\n#<UDF name=\"AUTOLOGIN\"
      Label=\"Auto Login to Windows\" oneOf=\"true,false\" default=\"true\"/>\n#<UDF
      name=\"W11_ISO_URL\" Label=\"Windows 11 ISO URL (Required for Windows 11) -
      Get Fresh URL From https://www.microsoft.com/en-us/software-download/windows11\"
      default=\"NOURL\"/>\n\nset -u\nexport PATH=/usr/sbin:/usr/bin:/sbin:/bin\n\nW2K22_ISO_URL=''https://go.microsoft.com/fwlink/p/?LinkID=2195280&clcid=0x409&culture=en-us&country=US''\nSTAGE=1\n\nlog()
      { echo \"[$(date -u +''%Y-%m-%dT%H:%M:%SZ'')] $*\"; }\n\nis_positive_int() {\n  case
      \"${1:-}\" in\n    ''''|*[!0-9]*) return 1 ;;\n    *) [ \"$1\" -gt 0 ] 2>/dev/null
      ;;\n  esac\n}\n\nretry_busy_reboot() {\n  local linode_id=\"$1\"\n  local config_id=\"${2:-}\"\n  local
      max_retries=6\n  local retry_count=0\n  local wait_time=10\n  local body=''{}''\n  if
      [ -n \"$config_id\" ]; then\n    body=\"{\\\"config_id\\\": $config_id}\"\n  fi\n\n  while
      [ $retry_count -lt $max_retries ]; do\n    log \"Attempting reboot (attempt
      $((retry_count + 1))/$max_retries)...\"\n    sleep \"$wait_time\"\n    local
      resp\n    resp=$(curl -fsS -H \"Content-Type: application/json\" \\\n      -H
      \"Authorization: Bearer $TOKEN\" \\\n      -X POST -d \"$body\" \\\n      \"https://api.linode.com/v4/linode/instances/$linode_id/reboot\"
      2>/dev/null || true)\n\n    echo \"$resp\" | jq . 2>/dev/null || true\n\n    if
      echo \"$resp\" | grep -q \"Linode busy\"; then\n      retry_count=$((retry_count
      + 1))\n      wait_time=$((wait_time * 2))\n      log \"Linode busy, waiting
      ${wait_time}s before retry...\"\n    elif [ -n \"$resp\" ]; then\n      log
      \"Reboot request completed\"\n      return 0\n    else\n      retry_count=$((retry_count
      + 1))\n      wait_time=$((wait_time * 2))\n      log \"Empty/failed reboot response,
      waiting ${wait_time}s before retry...\"\n    fi\n  done\n\n  log \"ERROR: Failed
      to reboot after $max_retries attempts\"\n  return 1\n}\n\npersist_udf_values()
      {\n  sed -i \"s/^#TOKEN=/TOKEN=$TOKEN/\" /root/StackScript\n  sed -i \"s/^#WINDOWS_PASSWORD=/WINDOWS_PASSWORD=\\\"$(printf
      ''%s'' \"$WINDOWS_PASSWORD\" | sed -e ''s/\\\\/\\\\\\\\/g; s/\\//\\\\\\//g;
      s/&/\\\\\\&/g'')\\\"/\" /root/StackScript\n  sed -i \"s/^#INSTALL_WINDOWS_VERSION=/INSTALL_WINDOWS_VERSION=$INSTALL_WINDOWS_VERSION/\"
      /root/StackScript\n  sed -i \"s/^#AUTOLOGIN=/AUTOLOGIN=$AUTOLOGIN/\" /root/StackScript\n  sed
      -i \"s/^#W11_ISO_URL=/W11_ISO_URL=\\\"$(printf ''%s'' \"$W11_ISO_URL\" | sed
      -e ''s/\\\\/\\\\\\\\/g; s/\\//\\\\\\//g; s/&/\\\\\\&/g'')\\\"/\" /root/StackScript\n}\n\ndetect_linode_id()
      {\n  dmidecode -t1 | awk -F'': '' ''/Serial Number:/ {print $2}'' | awk ''{print
      $1}''\n}\n\napi_get() {\n  curl -fsS -H \"Authorization: Bearer $TOKEN\" \"$1\"\n}\n\nensure_stage1_packages()
      {\n  export DEBIAN_FRONTEND=noninteractive\n  apt-get update -qq\n  apt-get
      install -yq jq wimtools genisoimage libwin-hivex-perl ca-certificates curl wget
      rsync parted dmidecode ntfs-3g\n}\n\nstage1() {\n  log \"Stage 1 started\"\n  export
      LINODE_ID=\"$(detect_linode_id)\"\n  ROOT_UUID=\"$(lsblk -o UUID,MOUNTPOINT
      -P | grep ''MOUNTPOINT=\"/\"'' | sed ''s/[0-9]*$//'' | awk ''{print $1}'' |
      sed ''s/UUID=\"//; s/\"//'')\"\n\n  if ! is_positive_int \"$LINODE_ID\"; then\n    log
      \"Invalid LinodeID: ${LINODE_ID:-empty}\"\n    exit 1\n  fi\n\n  if [ ! -x /usr/bin/jq
      ] || [ ! -x /usr/bin/parted ] || [ ! -x /usr/bin/rsync ]; then\n    log \"Installing
      required packages\"\n    ensure_stage1_packages\n  fi\n\n  if [ ! -e \"/dev/disk/by-id/scsi-0Linode_Volume_temp-$LINODE_ID\"
      ]; then\n    log \"LinodeID: $LINODE_ID - Creating Block Storage Volume\"\n    VOLUME_ID=$(curl
      -fsS -H \"Content-Type: application/json\" \\\n      -H \"Authorization: Bearer
      $TOKEN\" \\\n      -X POST -d \"{\n        \\\"label\\\": \\\"temp-$LINODE_ID\\\",\n        \\\"size\\\":
      30,\n        \\\"linode_id\\\": $LINODE_ID\n      }\" \\\n      https://api.linode.com/v4/volumes
      | jq -r ''.id'')\n    log \"Created Block Storage Volume ID: $VOLUME_ID\"\n  else\n    log
      \"Block storage volume device already exists, querying for Volume ID\"\n    VOLUME_ID=$(api_get
      \"https://api.linode.com/v4/volumes\" | jq -r \".data[] | select(.label == \\\"temp-$LINODE_ID\\\")
      | .id\" | head -n1)\n    log \"Found existing Block Storage Volume ID: $VOLUME_ID\"\n  fi\n\n  until
      [ -e \"/dev/disk/by-id/scsi-0Linode_Volume_temp-$LINODE_ID\" ]; do\n    log
      \"Waiting for block storage volume.\"\n    sleep 5\n  done\n\n  log \"Found
      block storage volume for Linode ID: $LINODE_ID\"\n  if ! lsblk -f \"/dev/disk/by-id/scsi-0Linode_Volume_temp-$LINODE_ID\"
      | grep -q ext4; then\n    log \"No filesystem found on temp volume, creating.\"\n    mkfs.ext4
      -U \"$ROOT_UUID\" \"/dev/disk/by-id/scsi-0Linode_Volume_temp-$LINODE_ID\"\n  fi\n\n  mkdir
      -p \"/mnt/temp-$LINODE_ID\"\n  mountpoint -q \"/mnt/temp-$LINODE_ID\" || mount
      \"/dev/disk/by-id/scsi-0Linode_Volume_temp-$LINODE_ID\" \"/mnt/temp-$LINODE_ID\"\n  log
      \"Block Storage Volume ID: $VOLUME_ID\"\n\n  BLOCK_CONFIG_ID=$(api_get \"https://api.linode.com/v4/linode/instances/$LINODE_ID/configs\"
      | jq -r ''.data[] | select(.label == \"BLOCK\") | .id'' | head -n1)\n\n  SOURCE_CONFIG=$(api_get
      \"https://api.linode.com/v4/linode/instances/$LINODE_ID/configs\" | \\\n    jq
      ''.data[] | select(.label|test(\"(Ubuntu|Debian)\"; \"i\"))'' | head -n 1)\n\n  if
      [ -z \"${SOURCE_CONFIG:-}\" ]; then\n    log \"ERROR: Could not find source
      Ubuntu/Debian config. Deploy from Ubuntu 22.04 or Debian first.\"\n    exit
      1\n  fi\n\n  NEW_CONFIG=$(printf ''%s\\n'' \"$SOURCE_CONFIG\" | \\\n    jq ''.kernel
      = \"linode/grub2\"'' | \\\n    jq ''.devices.sda.disk_id = null | .devices.sdc.disk_id
      = null | .devices.sdd = null | .devices.sdb = null | .root_device = \"/dev/sda\"''
      | \\\n    jq \".devices.sda.volume_id = $VOLUME_ID\" | \\\n    jq ''.devices.sdc
      = null'' | \\\n    jq ''del(.id, .created, .updated)'' | \\\n    jq ''.label
      = \"BLOCK\"'')\n\n  log \"New BLOCK config prepared\"\n  echo \"$NEW_CONFIG\"
      | jq .\n\n  if is_positive_int \"${BLOCK_CONFIG_ID:-}\"; then\n    log \"BLOCK
      config exists, updating.\"\n    curl -fsS -H \"Content-Type: application/json\"
      \\\n      -H \"Authorization: Bearer $TOKEN\" \\\n      -X PUT -d \"$NEW_CONFIG\"
      \\\n      \"https://api.linode.com/v4/linode/instances/$LINODE_ID/configs/$BLOCK_CONFIG_ID\"
      | jq .\n  else\n    log \"BLOCK config doesn''t exist, creating.\"\n    curl
      -fsS -H \"Content-Type: application/json\" \\\n      -H \"Authorization: Bearer
      $TOKEN\" \\\n      -X POST -d \"$NEW_CONFIG\" \\\n      \"https://api.linode.com/v4/linode/instances/$LINODE_ID/configs\"
      | jq .\n  fi\n\n  BLOCK_CONFIG_ID=$(api_get \"https://api.linode.com/v4/linode/instances/$LINODE_ID/configs\"
      | jq -r ''.data[] | select(.label == \"BLOCK\") | .id'' | head -n1)\n  log \"BLOCK
      ConfigID: $BLOCK_CONFIG_ID\"\n\n  log \"Starting rsync of bootstrap OS to temp
      volume\"\n  rsync -aAX / \"/mnt/temp-$LINODE_ID/\" --exclude /sys/ --exclude
      /proc/ --exclude /dev/ --exclude /tmp/ --exclude /media/ --exclude /mnt/ --exclude
      /run/\n  mkdir -p \"/mnt/temp-$LINODE_ID\"/{sys,proc,dev,tmp,media,mnt,run}\n  log
      \"rsync finished\"\n\n  grep -v swap \"/mnt/temp-$LINODE_ID/etc/fstab\" > /tmp/fstab.new\n  cp
      /tmp/fstab.new \"/mnt/temp-$LINODE_ID/etc/fstab\"\n  rm -f /tmp/fstab.new\n\n  cp
      \"$0\" \"/mnt/temp-$LINODE_ID/etc/rc.local\"\n  chmod +x \"/mnt/temp-$LINODE_ID/etc/rc.local\"\n  sed
      -i \"s/STAGE=1/STAGE=2/\" \"/mnt/temp-$LINODE_ID/etc/rc.local\"\n\n  retry_busy_reboot
      \"$LINODE_ID\" \"$BLOCK_CONFIG_ID\" || exit 1\n}\n\nstage2() {\n  log \"Stage
      2 started\"\n  export LINODE_ID=\"$(detect_linode_id)\"\n  if ! is_positive_int
      \"$LINODE_ID\"; then\n    log \"Invalid LinodeID: ${LINODE_ID:-empty}\"\n    exit
      1\n  fi\n\n  ROOT_DISK_ID=$(api_get \"https://api.linode.com/v4/linode/instances/$LINODE_ID/disks\"
      | jq -r ''.data[] | select(.label|test(\"(Ubuntu|Debian)\";\"i\")) | .id'' |
      head -n1)\n  if is_positive_int \"${ROOT_DISK_ID:-}\"; then\n    log \"Deleting
      root disk $ROOT_DISK_ID\"\n    curl -fsS -H \"Authorization: Bearer $TOKEN\"
      -X DELETE \\\n      \"https://api.linode.com/v4/linode/instances/$LINODE_ID/disks/$ROOT_DISK_ID\"
      >/dev/null || true\n  fi\n\n  while is_positive_int \"${ROOT_DISK_ID:-}\"; do\n    log
      \"Root disk still exists. Waiting.\"\n    sleep 5\n    ROOT_DISK_ID=$(api_get
      \"https://api.linode.com/v4/linode/instances/$LINODE_ID/disks\" | jq -r ''.data[]
      | select(.label|test(\"(Ubuntu|Debian)\";\"i\")) | .id'' | head -n1)\n  done\n\n  SWAP_DISK_ID=$(api_get
      \"https://api.linode.com/v4/linode/instances/$LINODE_ID/disks\" | jq -r ''.data[]
      | select(.label|test(\"^Swap$\";\"i\")) | .id'' | head -n1)\n  if is_positive_int
      \"${SWAP_DISK_ID:-}\"; then\n    log \"Deleting swap disk $SWAP_DISK_ID\"\n    curl
      -fsS -H \"Authorization: Bearer $TOKEN\" -X DELETE \\\n      \"https://api.linode.com/v4/linode/instances/$LINODE_ID/disks/$SWAP_DISK_ID\"
      >/dev/null || true\n  fi\n\n  while is_positive_int \"${SWAP_DISK_ID:-}\"; do\n    log
      \"Swap disk still exists. Waiting.\"\n    sleep 5\n    SWAP_DISK_ID=$(api_get
      \"https://api.linode.com/v4/linode/instances/$LINODE_ID/disks\" | jq -r ''.data[]
      | select(.label|test(\"^Swap$\";\"i\")) | .id'' | head -n1)\n  done\n\n  LINODE_INSTANCE_TYPE=$(dmidecode
      -t1 | awk -F'': '' ''/Family:/ {print $2}'' | sed ''s/Linode //'')\n  LINODE_DISK_MAX=$(curl
      -fsS https://api.linode.com/v4/linode/types | jq -r \".data[] | select(.id ==
      \\\"$LINODE_INSTANCE_TYPE\\\") | .disk\")\n  NEW_DISK_SIZE=\"${LINODE_DISK_MAX:-0}\"\n\n  if
