      "2018-01-02T03:04:05", "rev_note": "", "script": "#!/usr/bin/env bash\n# https://github.com/chevereto/linode-marketplace\n\nset
      -e\n\nCHEVERETO_INSTALLER_TAG=\"3.1.0\"\nWORKING_DIR=\"/var/www/html\"\n\n##
      REQUIRED IN EVERY MARKETPLACE SUBMISSION\n# Add Logging to /var/log/stackscript.log
