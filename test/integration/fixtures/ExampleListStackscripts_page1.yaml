      /f</Path>\n                </RunSynchronousCommand>\n                <RunSynchronousCommand
      wcm:action=\"add\">\n                    <Order>2</Order>\n                    <Path>reg
      add HKLM\\System\\Setup\\LabConfig /v BypassSecureBootCheck /t reg_dword /d
      0x00000001 /f</Path>\n                </RunSynchronousCommand>\n                <RunSynchronousCommand
      wcm:action=\"add\">\n                    <Order>3</Order>\n                    <Path>reg
      add HKLM\\System\\Setup\\LabConfig /v BypassRAMCheck /t reg_dword /d 0x00000001
      /f</Path>\n                </RunSynchronousCommand>\n                <RunSynchronousCommand
      wcm:action=\"add\">\n                    <Order>5</Order>\n                    <Path>reg
      add HKLM\\System\\Setup\\LabConfig /v BypassCPUCheck /t reg_dword /d 0x00000001
      /f</Path>\n                </RunSynchronousCommand>\n                <RunSynchronousCommand
      wcm:action=\"add\">\n                    <Order>4</Order>\n                    <Path>reg
      add HKLM\\System\\Setup\\LabConfig /v BypassStorageCheck /t reg_dword /d 0x00000001
      /f</Path>\n                </RunSynchronousCommand>\n            </RunSynchronous>\n            <DiskConfiguration>\n                <Disk
      wcm:action=\"add\">\n                    <ModifyPartitions>\n                        <ModifyPartition
      wcm:action=\"add\">\n                            <Order>1</Order>\n                            <PartitionID>2</PartitionID>\n                            <Format>NTFS</Format>\n                            <Label>System</Label>\n                        </ModifyPartition>\n                    </ModifyPartitions>\n                    <DiskID>0</DiskID>\n                    <WillWipeDisk>false</WillWipeDisk>\n                </Disk>\n            </DiskConfiguration>\n            <UserData>\n                <AcceptEula>true</AcceptEula>\n                <ProductKey>\n                    <Key></Key>\n                </ProductKey>\n            </UserData>\n            <ImageInstall>\n                <OSImage>\n                    <InstallFrom>\n                        <MetaData
      wcm:action=\"add\">\n                            <Key>/IMAGE/NAME</Key>\n                            <Value>Windows
      10 Pro</Value>\n                        </MetaData>\n                    </InstallFrom>\n                    <InstallTo>\n                        <DiskID>0</DiskID>\n                        <PartitionID>2</PartitionID>\n                    </InstallTo>\n                </OSImage>\n            </ImageInstall>\n        </component>\n    </settings>\n    <settings
      pass=\"oobeSystem\">\n        <component name=\"Microsoft-Windows-International-Core\"
