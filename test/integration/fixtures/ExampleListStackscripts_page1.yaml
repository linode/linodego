      Run initial configuration tasks (DNS/SSH stuff, etc...)\nsource <ssinclude StackScriptID=666912>\n\nsource
      <ssinclude StackScriptID=\"401712\">\nexec > >(tee /dev/ttyS0 /var/log/stackscript.log)
      2>&1\n\nfunction mongoinstall {\n    apt-get install -y wget gnupg\n    if [
      $MONGOVERSION == \"5.0\" ]; then\n        wget -qO - https://www.mongodb.org/static/pgp/server-5.0.asc
      | sudo apt-key add -\n        echo \"deb [ arch=amd64,arm64 ] https://repo.mongodb.org/apt/ubuntu
      focal/mongodb-org/5.0 multiverse\" | sudo tee /etc/apt/sources.list.d/mongodb-org-5.0.list\n    elif
      [ $MONGOVERSION == \"4.4\" ]; then\n        wget -qO - https://www.mongodb.org/static/pgp/server-4.4.asc
      | sudo apt-key add -\n        echo \"deb [ arch=amd64,arm64 ] https://repo.mongodb.org/apt/ubuntu
