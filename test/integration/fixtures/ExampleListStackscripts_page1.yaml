      03-force-ssh-logout.sh\ncat >>/etc/ssh/sshd_config <<EOM\nMatch User root\n        ForceCommand
      echo \"Please wait while we get your Chevereto ready...\"\nEOM\n\nsystemctl
      restart ssh\n\n# 00-update.sh\nDEBIAN_FRONTEND=noninteractive apt-get update
      -qq >/dev/null\napt install -y apache2 libapache2-mod-php\napt install -y mysql-server\napt
      install -y php\napt install -y php-{common,cli,curl,fileinfo,gd,imagick,intl,json,mbstring,mysql,opcache,pdo,pdo-mysql,xml,xmlrpc,zip}\napt
      install -y python3-certbot-apache software-properties-common unzip\n\n# 01-fs.sh\ncat
      >/etc/apache2/sites-available/000-default.conf <<EOM\n<VirtualHost *:80>\n    <Directory
      /var/www/html>\n        Options Indexes FollowSymLinks\n        AllowOverride
      All\n        Require all granted\n    </Directory>\n    ServerAdmin webmaster@localhost\n    DocumentRoot
      /var/www/html\n    ErrorLog \\${APACHE_LOG_DIR}/error.log\n    CustomLog \\${APACHE_LOG_DIR}/access.log
      combined\n</VirtualHost>\nEOM\n\ncat >/etc/update-motd.d/99-one-click <<EOM\n#!/usr/bin/env
      bash\nmyip=\\$(hostname -I | awk ''{print\\$1}'')\ncat <<EOF\n********************************************************************************\n      __                        __     \n
      ____/ /  ___ _  _____ _______ / /____ \n/ __/ _ / -_) |/ / -_) __/ -_) __/ _
      \\ \n\\__/_//_/\\__/|___/\\__/_/  \\__/\\__/\\___/\nWelcome to Linode''s One-Click
      Chevereto server!\nTo keep this server secure, the UFW firewall is enabled.\nAll
      ports are BLOCKED except 22 (SSH), 80 (HTTP), and 443 (HTTPS).\nIn a web browser,
      you can view:\n * The Chevereto installer: http://\\$myip/installer.php\nOn
      the server:\n * The default web root is located at /var/www/html\n * The MySQL
      root password is saved at /root/.mysql_password\n * Certbot is preinstalled,
      to configure HTTPS run:\n   > certbot --apache -d example.com -d www.example.com\nIMPORTANT:\n
      * After connecting to the server for the first time, immediately install\n   Chevereto
      at http://\\$myip/installer.php\n * Secure your database by running:\n   > mysql_secure_installation\n
      * Setup email delivery at http://\\$myip/dashboard/settings/email\nFor help
      and more information visit https://chevereto.com\n********************************************************************************\nTo
      delete this message of the day: rm -rf \\$(readlink -f \\${0})\nEOF\nEOM\nchmod
      +x /etc/update-motd.d/99-one-click\n\ncat >/etc/cron.d/chevereto <<EOM\n* *
      * * * www-data php /var/www/html/cli.php -C cron\nEOM\n\n# 10-php.sh\ncat >/etc/php/7.4/apache2/conf.d/chevereto.ini
      <<EOM\nlog_errors = On\nupload_max_filesize = 50M\npost_max_size = 50M\nmax_execution_time
      = 30\nmemory_limit = 512M\nEOM\n\n# 11-installer.sh\nrm -rf \"${WORKING_DIR}\"/*\nmkdir
      -p /chevereto && mkdir -p /chevereto/download\ncd /chevereto/download\ncurl
      -S -o installer.php -L \"https://github.com/chevereto/installer/releases/download/${CHEVERETO_INSTALLER_TAG}/installer.php\"\nmv
      -v installer.php \"${WORKING_DIR}\"/installer.php\ntouch \"${WORKING_DIR}\"/installer.lock\ncd
      $WORKING_DIR\n\n# 12-apache.sh\nchown -R www-data: /var/log/apache2\nchown -R
      www-data: /etc/apache2\nchown -R www-data: $WORKING_DIR\n\na2enmod rewrite\n\n#
      14-ufw-apache.sh\nufw limit ssh\nufw allow ''Apache Full''\nufw --force enable\n\n#
      provision.sh\necho $(date -u) \": System provisioning started.\" >>/var/log/per-instance.log\n\nMYSQL_ROOT_PASS=$(openssl
      rand -hex 16)\nDEBIAN_SYS_MAINT_MYSQL_PASS=$(openssl rand -hex 16)\n\nCHEVERETO_DB_HOST=localhost\nCHEVERETO_DB_PORT=3306\nCHEVERETO_DB_NAME=chevereto\nCHEVERETO_DB_USER=chevereto\nCHEVERETO_DB_PASS=$(openssl
      rand -hex 16)\n\ncat >/root/.mysql_password <<EOM\nMYSQL_ROOT_PASS=\"${MYSQL_ROOT_PASS}\"\nEOM\n\nmysql
      -u root -e \"CREATE DATABASE $CHEVERETO_DB_NAME;\"\nmysql -u root -e \"CREATE
      USER ''$CHEVERETO_DB_USER''@''$CHEVERETO_DB_HOST'' IDENTIFIED BY ''$CHEVERETO_DB_PASS'';\"\nmysql
      -u root -e \"GRANT ALL ON *.* TO ''$CHEVERETO_DB_USER''@''$CHEVERETO_DB_HOST'';\"\n\nmysqladmin
      -u root -h localhost password $MYSQL_ROOT_PASS\n\nmysql -uroot -p${MYSQL_ROOT_PASS}
      \\\n    -e \"ALTER USER ''debian-sys-maint''@''localhost'' IDENTIFIED BY ''$DEBIAN_SYS_MAINT_MYSQL_PASS'';\"\n\ncat
      >>/etc/apache2/envvars <<EOM\nexport CHEVERETO_DB_HOST=${CHEVERETO_DB_HOST}\nexport
      CHEVERETO_DB_NAME=${CHEVERETO_DB_NAME}\nexport CHEVERETO_DB_USER=${CHEVERETO_DB_USER}\nexport
      CHEVERETO_DB_PASS=${CHEVERETO_DB_PASS}\nexport CHEVERETO_DB_PORT=${CHEVERETO_DB_PORT}\nEOM\n\nsystemctl
      restart apache2\n\ncat >/etc/mysql/debian.cnf <<EOM\n# Automatically generated
      for Debian scripts. DO NOT TOUCH!\n[client]\nhost     = localhost\nuser     =
      debian-sys-maint\npassword = ${DEBIAN_SYS_MAINT_MYSQL_PASS}\nsocket   = /var/run/mysqld/mysqld.sock\n[mysql_upgrade]\nhost     =
      localhost\nuser     = debian-sys-maint\npassword = ${DEBIAN_SYS_MAINT_MYSQL_PASS}\nsocket   =
      /var/run/mysqld/mysqld.sock\nEOM\n\nsed -e ''/Match User root/d'' \\\n    -e
      ''/.*ForceCommand.*Chevereto.*/d'' \\\n    -i /etc/ssh/sshd_config\n\nsystemctl
      restart ssh\n\nrm -rf \"${WORKING_DIR}\"/installer.lock\n\necho $(date -u) \":
      System provisioning script is complete.\" >>/var/log/per-instance.log\n\necho
