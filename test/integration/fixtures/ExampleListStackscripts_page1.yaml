      ["linode/ubuntu22.04"], "deployments_total": 1, "deployments_active": 0, "is_public":
      true, "mine": false, "created": "2018-01-02T03:04:05", "updated": "2018-01-02T03:04:05",
      "rev_note": "", "script": "#!/bin/bash\n#\n# Bootstrap installs Windows ISO
      to a Linode from a temporary block storage volume.\n# by Kit Knox - Akamai Technologies\n#\n#
      - Downloads ISO directly from Microsoft\n# - Overlays VirtIO Drivers into ISO\n#
      - Deploys ISO as Bootable USB on recovery partition on main raw disk\n# - Deploys
      autounattend.xml to fully automate installation of Windows and enabling of Remote
      Desktop\n#\n#<UDF name=\"TOKEN\" Label=\"Linode API Token\" />\n#<UDF name=\"WINDOWS_PASSWORD\"
      Label=\"Administrator Password for Windows\" example=\"Password\" />\n#<UDF
      name=\"INSTALL_WINDOWS_VERSION\" Label=\"Windows Version\" oneOf=\"w11,2k22\"
      default=\"2k22\"/>\n#<UDF name=\"AUTOLOGIN\" Label=\"Auto Login to Windows\"
      oneOf=\"true,false\" default=\"true\"/>\n#<UDF name=\"W11_ISO_URL\" Label=\"Windows
      11 ISO URL (Not Required For Windows Server) - Get Fresh URL From https://www.microsoft.com/en-us/software-download/windows11\"
      default=\"NOURL\"/>\n\n# Replaced with values from StackScript UDF\n#TOKEN=\n#WINDOWS_PASSWORD=\n#INSTALL_WINDOWS_VERSION=\n#AUTOLOGIN=\n#W11_ISO_URL=\nW2K22_ISO_URL=''https://go.microsoft.com/fwlink/p/?LinkID=2195280&clcid=0x409&culture=en-us&country=US''\n\n#
      STAGE changes dynamically as install progresses\nSTAGE=1\n# Persist UDF variables
      for future stages after reboot\nif [ $STAGE == 1 ]; then\n  sed -i \"s/^#TOKEN=/TOKEN=$TOKEN/\"
      /root/StackScript\n  sed -i \"s/^#WINDOWS_PASSWORD=/WINDOWS_PASSWORD=\\\"$(echo
      $WINDOWS_PASSWORD | sed -e ''s/\\\\/\\\\\\\\/g; s/\\//\\\\\\//g; s/&/\\\\\\&/g'')\\\"/\"
      /root/StackScript\n  sed -i \"s/^#INSTALL_WINDOWS_VERSION=/INSTALL_WINDOWS_VERSION=$INSTALL_WINDOWS_VERSION/\"
      /root/StackScript\n  sed -i \"s/^#AUTOLOGIN=/AUTOLOGIN=$AUTOLOGIN/\" /root/StackScript\n  sed
      -i \"s/^#W11_ISO_URL=/W11_ISO_URL=\\\"$(echo $W11_ISO_URL | sed -e ''s/\\\\/\\\\\\\\/g;
      s/\\//\\\\\\//g; s/&/\\\\\\&/g'')\\\"/\" /root/StackScript\nfi\n\nstage1() {\n  echo
      \"Stage 1 started\"\n  export LINODE_ID=`dmidecode -t1 | grep Serial | awk ''{print
      $3}''`\n  ROOT_UUID=`lsblk -o UUID,MOUNTPOINT -P |  grep ''MOUNTPOINT=\"/\"''
      | sed ''s/[0-9]*$//'' | awk ''{print $1}'' | sed ''s/UUID=\"//'' | sed ''s/\"//''`\n  if
      ! [ $LINODE_ID -gt 0 ]; then\n    echo \"Invalid LinodeID\"\n    exit\n  fi\n  if
      ! [ -f \"/usr/bin/jq\" ]; then\n    echo \"jq package missing\"\n    export
      DEBIAN_FRONTEND=noninteractive\n    apt update\n    apt install -yq jq wimtools
      genisoimage libwin-hivex-perl\n  fi\n  if ! [ -e \"/dev/disk/by-id/scsi-0Linode_Volume_temp-$LINODE_ID\"
      ]; then\n    echo \"LinodeID: $LINODE_ID - Creating Block Storage Volume\"\n    curl
      -sH \"Content-Type: application/json\" \\\n      -H \"Authorization: Bearer
      $TOKEN\" \\\n      -X POST -d \"{\n        \\\"label\\\": \\\"temp-$LINODE_ID\\\",\n        \\\"size\\\":
      30,\n        \\\"linode_id\\\": $LINODE_ID\n      }\" \\\n      https://api.linode.com/v4/volumes
      | json_pp\n  fi\n  while ! [ -e \"/dev/disk/by-id/scsi-0Linode_Volume_temp-$LINODE_ID\"
      ]\n  do\n    echo \"Waiting for block storage volume.\"\n    sleep 5\n  done\n  echo
      \"Found block storage volume for Linode ID: $LINODE_ID\"\n  if ! lsblk -f \"/dev/disk/by-id/scsi-0Linode_Volume_temp-$LINODE_ID\"
      | grep ext4 > /dev/null; then\n    echo \"No filesystem found, creating.\"\n    mkfs.ext4
      -U $ROOT_UUID \"/dev/disk/by-id/scsi-0Linode_Volume_temp-$LINODE_ID\"\n  fi  \n  mkdir
      \"/mnt/temp-$LINODE_ID\"\n  mount  \"/dev/disk/by-id/scsi-0Linode_Volume_temp-$LINODE_ID\"
      /mnt/temp-$LINODE_ID\n  VOLUME_ID=`curl -sH \"Authorization: Bearer $TOKEN\"     https://api.linode.com/v4/volumes
      | jq \".data[] | select (.label == \\\"temp-$LINODE_ID\\\") | .id\"`\n  echo
      \"Block Storage Volume ID: $VOLUME_ID\"\n\n  BLOCK_CONFIG_ID=`curl -sH \"Authorization:
      Bearer $TOKEN\" \\\n      https://api.linode.com/v4/linode/instances/$LINODE_ID/configs
      | jq ''.data[] | select (.label == \"BLOCK\") | .id''`\n  NEW_CONFIG=`curl -sH
      \"Authorization: Bearer $TOKEN\" \\\n    https://api.linode.com/v4/linode/instances/$LINODE_ID/configs
      | jq \".data[] | select (.label|test(\\\"My (Ubuntu|Debian).*\\\"))\" | jq ''.kernel
      = \"linode/grub2\"'' | jq '' .devices.sda.disk_id = null | .devices.sda.disk_id
      = null | .devices.sdc.disk_id = null | .devices.sdd = null | .devices.sdb =
      null | .root_device = \"/dev/sda\"'' | jq \" .devices.sda.volume_id = $VOLUME_ID\"
      | jq \" .devices.sdc = null\" | grep -v \"\\\"id\\\":\" | jq ''.label = \"BLOCK\"''
      | grep -v \"\\\"created\\\":\" | grep -v \"\\\"updated\\\":\"`\n\n  echo \"##
      New Config\"\n  echo \"$NEW_CONFIG\" | jq\n\n  if ! [ $BLOCK_CONFIG_ID -gt 0
      ]; then\n    echo \"BLOCK config doesn''t exist, creating.\"\n    curl -sH \"Content-Type:
      application/json\" \\\n        -H \"Authorization: Bearer $TOKEN\" \\\n        -X
      POST -d \"$NEW_CONFIG\"\\\n        https://api.linode.com/v4/linode/instances/$LINODE_ID/configs
      | jq\n  else\n    echo \"BLOCK config exists, updating.\"\n    curl -sH \"Content-Type:
      application/json\" \\\n        -H \"Authorization: Bearer $TOKEN\" \\\n        -X
      PUT -d \"$NEW_CONFIG\"\\\n        https://api.linode.com/v4/linode/instances/$LINODE_ID/configs/$BLOCK_CONFIG_ID
      | jq\n  fi\n\n  BLOCK_CONFIG_ID=`curl -sH \"Authorization: Bearer $TOKEN\" \\\n      https://api.linode.com/v4/linode/instances/$LINODE_ID/configs
      | jq ''.data[] | select (.label == \"BLOCK\") | .id''`\n  echo \"BLOCK ConfigID:
